<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Packs | Kawaii.2K</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div class="page-header" style="padding: 40px 10% 0 10%;">
            <h2 class="section-title">Tài Nguyên Hình Ảnh</h2>
            <p style="opacity: 0.6;">Nâng tầm trải nghiệm thị giác máy chủ.</p>
        </div>
        <div id="resource-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        const container = document.getElementById('resource-list');

        container.innerHTML = siteData.resources.map(item => `
            <div class="card">
                <img src="${item.img}" alt="${item.name}" style="width:100%; height:200px; object-fit:cover;">
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span class="badge" style="background:var(--primary); color:white; padding:2px 8px; border-radius:5px; font-size:0.7rem;">${item.size}</span>
                    </div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <button onclick="window.viewDetail('${item.mdPath}')" class="btn-primary">Xem Chi Tiết</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
