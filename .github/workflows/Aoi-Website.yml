name: в—ЎрџҐЂрќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџҐЂв—Ў П‰С”РІ

on:
  # push:
    # branches: ["main"]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aoichan:
    name: рџЌ’рќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџ¦‹
    runs-on: ubuntu-latest
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: рџ“Ґ Checkout
        uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Artifacts вћє Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          
      - name: Triб»ѓn khai вћєгЂђGitHub PagesгЂ‘
        id: deployment
        uses: actions/deploy-pages@v5
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ deployment
        run: |
          gh api repos/${{ github.repository }}/deployments \
            --jq '.[] | select(.environment=="github-pages") | .id' \
            | while read id; do
                echo "рџ—‘пёЏ deleting deployment $id"
                gh api repos/${{ github.repository }}/deployments/$id -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }} 
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ–рќђЋрќђ‘рќђЉрќђ…рќђ‹рќђЋрќђ–рќђ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[1:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}

      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ‚рќђЂрќђ‚рќђ‡рќђ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[1:] | .[].id' \
            | while read id; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}
