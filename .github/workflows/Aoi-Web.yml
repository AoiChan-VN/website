name: в—ЎрџҐЂрќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџҐЂв—Ў П‰С”РІ

on:
  #push:
   #branches: ["main"]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  aoichan:
    name: рџЌ’рќ“ђрќ“ёрќ“Ірќ“’рќ“±ДЃnрџ¦‹
    runs-on: ubuntu-latest
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: рџ‘ЁвЂЌрџ’» Checkout mГЈ nguб»“n
        uses: actions/checkout@v4
          
      - name: Artifacts вћє Deploy
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
          
      - name: Triб»ѓn khai вћєгЂђGitHub PagesгЂ‘
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ deployment
        run: |
          gh api repos/${{ github.repository }}/deployments --jq '.[] | select(.environment=="github-pages") | .id' | tail -n +2 | while read id; do
            echo "рџ—‘пёЏ deleting deployment $id"
            gh api repos/${{ github.repository }}/deployments/$id -X DELETE
          done
        env:
          GH_TOKEN: ${{ secrets.AOI_WEB }} 
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ–рќђЋрќђ‘рќђЉрќђ…рќђ‹рќђЋрќђ–рќђ’
        run: |
          gh run list --status completed --limit 100 --json databaseId | jq -r '.[1:] | .[].databaseId' | while read run; do
            echo "рџ—‘пёЏ Д‘ГЈ xГіa workflow run: $run"
            gh run delete "$run"
          done
        env:
          GH_TOKEN: ${{ secrets.AOI_WEB }}

      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ‚рќђЂрќђ‚рќђ‡рќђ„
        run: |
          gh cache list --json id,createdAt | jq -r 'sort_by(.createdAt) | reverse | .[1:] | .[].id' | while read id; do
            echo "рџ—‘пёЏ Д‘ГЈ xГіa cache: $id"
            gh cache delete "$id"
          done
        env:
          GH_TOKEN: ${{ secrets.AOI_WEB }}
