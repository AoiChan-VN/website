<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải Về | Kawaii.2K</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main style="padding: 60px 10%;">
        <div class="card download-box" style="max-width: 900px; margin: 0 auto; padding: 40px; border-radius: 30px;">
            <h2 style="margin-top:0;">📥 Trung Tâm Dữ Liệu</h2>
            <p style="opacity: 0.6; margin-bottom: 30px;">Vui lòng chọn đúng phiên bản phù hợp với thiết bị của bạn.</p>
            
            <div class="table-container">
                <div id="file-list"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        document.getElementById('file-list').innerHTML = siteData.downloads.map(f => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:rgba(0,0,0,0.1); margin-bottom:10px; border-radius:15px;">
                <div>
                    <span style="font-weight:bold; font-size:1.1rem; display:block;">${f.name}</span>
                    <small style="opacity:0.5;">Dung lượng: ${f.size}</small>
                </div>
                <a href="${f.link}" class="btn-primary" style="width:auto; padding:10px 30px; text-decoration:none;">Download</a>
            </div>
        `).join('');
    </script>
</body>
</html>
