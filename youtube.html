<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Media | MC Server</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="header-root"></div>

    <main style="padding: 20px 10%;">
        <h2 style="border-left: 5px solid #ef4444; padding-left: 15px;">Media & Trailer</h2>
        <div id="video-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header, ProjectCard } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';

        document.getElementById('header-root').innerHTML = Header();

        const container = document.getElementById('video-list');
        container.innerHTML = siteData.youtube.map(vid => `
            <div class="card">
                <iframe width="100%" src="https://youtube.com{vid.videoId}" frameborder="0"></iframe>
                <div class="card-body">
                    <h3>${vid.title}</h3>
                    <a href="${siteData.settings.youtubeChannel}" target="_blank" class="btn-primary">
                        🎬 Xem kênh chính chủ
                    </a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
