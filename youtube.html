<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | Kawaii.2K</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div class="page-header" style="padding: 40px 10% 0 10%;">
            <h2 class="section-title">Media & Trailers</h2>
        </div>
        <div id="video-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        document.getElementById('video-list').innerHTML = siteData.youtube.map(vid => `
            <div class="card">
                <div class="video-ratio" style="position:relative; padding-bottom:56.25%; height:0; background:#000;">
                    <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                        src="https://youtube.com{vid.videoId}" 
                        title="${vid.title}" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="card-body">
                    <h3 style="font-size:1.1rem; min-height:50px;">${vid.title}</h3>
                    <a href="${siteData.settings.youtubeChannel}" target="_blank" class="btn-primary" 
                       style="display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;">
                       <span>Đăng ký kênh</span>
                    </a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
