<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Media | MC Server</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="header-root"></div>

    <main style="padding: 20px 10%;">
        <h2 style="border-left: 5px solid #ef4444; padding-left: 15px;">Media & Trailer</h2>
        <div id="video-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header, ProjectCard } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';

        document.getElementById('header-root').innerHTML = Header();
        
        const container = document.getElementById('video-list');
        // Tái sử dụng ProjectCard nhưng với dữ liệu Youtube
        container.innerHTML = siteData.youtube.map(item => ProjectCard({
            name: item.title,
            version: item.date,
            desc: "Bấm để xem video trên nền tảng Youtube.",
            img: "https://placehold.co" // Giả lập ảnh thumb video
        })).join('');
    </script>
</body>
</html>
