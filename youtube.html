<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊𝐘𝐨𝐮𝐭𝐮𝐛𝐞</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div style="padding: 40px 10% 0 10%;"><h2 style="border-left: 5px solid var(--primary); padding-left: 15px;">Video Media</h2></div>
        <div id="video-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        document.getElementById('video-list').innerHTML = siteData.youtube.map(vid => `
            <div class="card">
                <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden;">
                    <iframe style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;" src="https://youtube.com{vid.videoId}" allowfullscreen></iframe>
                </div>
                <div class="card-body">
                    <h3 style="margin-bottom:15px;">${vid.title}</h3>
                    <a href="http://youtube.com" target="_blank" class="btn-primary" style="display:block; text-align:center; text-decoration:none;">Ghé Thăm Kênh</a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
