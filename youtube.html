<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊Youtube</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div class="page-header" style="padding: 40px 10% 0 10%;">
            <h2 class="section-title">Hành Trình Media</h2>
            <p style="opacity: 0.6;">Theo dõi các video trailer và hướng dẫn mới nhất.</p>
        </div>
        <div id="video-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        const container = document.getElementById('video-list');

        container.innerHTML = siteData.youtube.map(vid => `
            <div class="card">
                <div class="card-img-wrapper">
                    <!-- Hiện GIF thay vì Iframe thô kệch -->
                    <img src="${vid.gifThumb}" alt="${vid.title}" onerror="this.src='https://placehold.co'">
                </div>
                <div class="card-body" style="display: flex; flex-direction: column; height: 180px; justify-content: space-between;">
                    <div>
                        <span style="color:var(--primary); font-size:0.75rem; font-weight:bold; text-transform:uppercase;">Phát hành: ${vid.date}</span>
                        <h3 style="margin: 10px 0; font-size:1.15rem; line-height:1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${vid.title}</h3>
                    </div>
                    <a href="${siteData.settings.youtubeChannel}" target="_blank" class="btn-primary" 
                       style="display: flex; align-items: center; justify-content: center; text-decoration: none; box-sizing: border-box; text-align: center;">
                       Youtube
                    </a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
