<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Resources | AoiChan Vault</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/rs/resource.css">
</head>
<body>
    <header style="padding: 30px 5%; display: flex; justify-content: space-between;">
        <div class="logo">AOI<span style="color: var(--accent);">VAULT</span></div>
        <a href="../index.html" style="color:#fff; text-decoration:none;">CLOSE ACCESS ✕</a>
    </header>

    <main class="container" style="max-width: 1200px; margin: 0 auto; padding: 50px 20px;">
        <h1>System <span style="color: var(--accent);">Resources</span></h1>
        <div class="res-container animate">
            <table>
                <thead>
                    <tr>
                        <th>Resource Name</th>
                        <th>Type</th>
                        <th>File Size</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="res-list"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import DATABASE_RESOURCE from '../src/db/rs-db.js';
        const list = document.getElementById('res-list');
        list.innerHTML = DATABASE_RESOURCE.items.map(rs => `
            <tr>
                <td><strong>${rs.name}</strong><br><small style="color:#444">${DATABASE_RESOURCE.tag}</small></td>
                <td><span class="file-type">${rs.type}</span></td>
                <td style="font-family: monospace;">${rs.size}</td>
                <td><a href="${rs.link}" style="color: var(--accent); text-decoration: none; font-weight: 800;">DOWNLOAD_SRC</a></td>
            </tr>
        `).join('');
    </script>
</body>
</html>
