<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Library | AoiChan Vault</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/rs/resource.css">
</head>
<body>
    <header class="container main-header">
        <div class="logo">AOI<span>VAULT</span></div>
        <nav>
            <a href="../index.html">← CORE_SYSTEM</a>
        </nav>
    </header>

    <main class="container animate">
        <div style="padding: 40px 0;">
            <span class="tag-v">STORAGE v2.6</span>
            <h1 style="margin-top: 15px;">System <span style="color: var(--accent);">Resources</span></h1>
        </div>

        <div class="res-container">
            <table>
                <thead>
                    <tr>
                        <th>Resource Name</th>
                        <th>Type</th>
                        <th>File Size</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="render-rs">
                    <!-- Dữ liệu đổ từ rs-db.js -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/security.js"></script>
    <script type="module">
        import DATABASE_RESOURCE from '../src/db/rs-db.js';
        const container = document.getElementById('render-rs');
        
        container.innerHTML = DATABASE_RESOURCE.items.map(rs => `
            <tr id="${rs.id}">
                <td><strong>${rs.name}</strong></td>
                <td><span class="file-type">${rs.type}</span></td>
                <td style="font-family: monospace; color: #666;">${rs.size}</td>
                <td><a href="${rs.link}" class="download-link">DOWNLOAD_SRC</a></td>
            </tr>
        `).join('');
    </script>
</body>
</html>
