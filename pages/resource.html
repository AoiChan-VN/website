<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Packs | AoiChan</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/res/rs.css">
</head>
<body data-theme="dark">
    <div id="header-root"></div>

    <main class="container">
        <div class="page-header" style="padding: 3rem 0; text-align: center;">
            <h1>Resource Packs</h1>
            <p>Nâng tầm đồ họa Server của bạn.</p>
        </div>
        
        <div id="rs-list" class="grid"></div>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { RESOURCE_DATA } from '../src/db/rs-db.js';
        const list = document.getElementById('rs-list');
        list.innerHTML = RESOURCE_DATA.map(item => `
            <div class="card" id="${item.id}">
                <div class="img-preview" style="background:#000; height:150px; border-radius:8px; margin-bottom:1rem;"></div>
                <span class="tag-${item.tag}">${item.tag.toUpperCase()}</span>
                <h3>${item.name}</h3>
                <p>Độ phân giải: ${item.size}</p>
                <small>Hỗ trợ: ${item.version}</small>
                <br><br>
                <a href="${item.link}" class="btn">Download</a>
            </div>
        `).join('');
    </script>
    <script type="module" src="../assets/js/core.js"></script>
</body>
</html>
