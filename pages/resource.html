<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource | AoiChan Vault</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/rs/resource.css">
</head>
<body>
    <header></header>
    <main class="container">
        <section style="padding: 60px 0 20px 0;">
            <span class="tag-v">STORAGE</span>
            <h1 style="margin-top: 15px;">System <span style="color: var(--accent);">Resources</span></h1>
        </section>
        <div class="res-container animate">
            <table class="res-table">
                <thead>
                    <tr><th>NAME</th><th>TYPE</th><th>SIZE</th><th>ACTION</th></tr>
                </thead>
                <tbody id="render-rs"></tbody>
            </table>
        </div>
    </main>
    <footer></footer>
    <script type="module">
        import { renderHeader } from '../src/components/header.js';
        import { renderFooter } from '../src/components/footer.js';
        import DATABASE_RESOURCE from '../src/db/rs-db.js';
        renderHeader(true);
        renderFooter();
        document.getElementById('render-rs').innerHTML = DATABASE_RESOURCE.items.map(rs => `
            <tr>
                <td><strong>${rs.name}</strong></td>
                <td><span class="file-type">${rs.type}</span></td>
                <td style="color:#666">${rs.size}</td>
                <td><a href="${rs.link}" class="btn" style="font-size:10px;">DOWNLOAD</a></td>
            </tr>
        `).join('');
    </script>
</body>
</html>
