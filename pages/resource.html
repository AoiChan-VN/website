<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Resource | AoiChan Vault</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/rs/resource.css">
</head>
<body>
    <header></header>
    <main class="container">
        <h1 style="padding: 60px 0 20px 0;">System <span style="color: var(--accent);">Resources</span></h1>
        <div class="res-container animate">
            <table class="res-table">
                <thead>
                    <tr><th>NAME</th><th>TYPE</th><th>SIZE</th><th>ACTION</th></tr>
                </thead>
                <tbody id="render-rs"></tbody>
            </table>
        </div>
    </main>
    <footer></footer>

    <script type="module">
        import { App } from '../assets/js/core.js';
        import DATABASE_RESOURCE from '../src/db/rs-db.js';
        
        App.reinitPage();
        
        const container = document.getElementById('render-rs');
        container.innerHTML = DATABASE_RESOURCE.items.map(rs => `
            <tr>
                <td><strong>${rs.name}</strong></td>
                <td><span class="file-type">${rs.type}</span></td>
                <td style="font-family: monospace; color: #444;">${rs.size}</td>
                <td><a href="${rs.link}" style="color: var(--accent); font-size: 12px; font-weight: 800; text-decoration: none;">DOWNLOAD</a></td>
            </tr>
        `).join('');
    </script>
</body>
</html>
