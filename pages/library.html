<!-- FILE: pages/library.html -->

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Portal Library</title>

    <link
        rel="stylesheet"
        href="../styles/reset.css"
    />

    <link
        rel="stylesheet"
        href="../styles/root.css"
    />

    <link
        rel="stylesheet"
        href="../styles/layout.css"
    />

    <link
        rel="stylesheet"
        href="../styles/portal-ui.css"
    />

</head>

<body>

    <main id="library-page">

        <div id="document-viewer-container"></div>

        <section id="library-panel">

            <header id="library-header">

                <h1>
                    DOCUMENT LIBRARY
                </h1>

            </header>

            <div id="library-list">

                <button
                    class="library-document"
                    data-document="../assets/docs/lore.txt"
                >
                    lore.txt
                </button>

                <button
                    class="library-document"
                    data-document="../assets/docs/guide.md"
                >
                    guide.md
                </button>

                <button
                    class="library-document"
                    data-document="../assets/docs/manual.pdf"
                >
                    manual.pdf
                </button>

            </div>

        </section>

    </main>

    <script type="module">

        import {
            initializeDocumentViewer,
            loadDocument
        } from '../modules/document-viewer.js';

        initializeDocumentViewer();

        const buttons =
            document.querySelectorAll(
                '.library-document'
            );

        buttons.forEach((button)=>{

            button.addEventListener(
                'click',
                async ()=>{

                    const file =
                        button.dataset.document;

                    await loadDocument(
                        file
                    );

                    document
                        .getElementById(
                            'document-viewer-container'
                        )
                        .classList
                        .add(
                            'active'
                        );

                },
                {
                    passive:true
                }
            );

        });

    </script>

</body>
</html>
