<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Channel | AoiChan Live</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/yt/channel.css">
</head>
<body>
    <header></header>
    <main class="container">
        <div style="padding: 60px 0;">
            <h1><span style="color: #ff0000;">Live</span> Channel</h1>
        </div>
        <div id="yt-render" class="grid-layout"></div>
    </main>
    <footer></footer>

    <script type="module">
        import { App } from '../assets/js/core.js';
        import DATABASE_YOUTUBE from '../src/db/yt-db.js';
        
        App.reinitPage();
        
        const grid = document.getElementById('yt-render');
        grid.innerHTML = DATABASE_YOUTUBE.items.map(yt => `
            <div class="card animate" style="padding:0; overflow:hidden;">
                <div style="width:100%; aspect-ratio:16/9; background:#111; display:flex; align-items:center; justify-content:center; position:relative;">
                    <div style="width:50px; height:50px; background:#ff0000; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div style="padding:20px;">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">${yt.title}</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size: 12px; color:#444;">${yt.views} Views</span>
                        <a href="${yt.url}" target="_blank" style="color:var(--accent); font-size:12px; text-decoration:none; font-weight:800;">WATCH</a>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
