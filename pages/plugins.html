<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Plugins | AoiChan Core</title>
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>
    <header></header>
    <main class="container">
        <section style="padding: 60px 0;">
            <span style="font-size: 10px; color: var(--accent); letter-spacing: 2px;">REPOSITORY</span>
            <h1 style="margin-top: 10px;">Advanced <span style="color: var(--accent);">Plugins</span></h1>
        </section>
        <div id="plugin-grid" class="grid-layout"></div>
    </main>
    <footer></footer>

    <script type="module">
        import { App } from '../assets/js/core.js';
        import DATABASE_PLUGINS from '../src/db/pl-db.js';
        
        App.reinitPage(); // Tự nạp Header/Footer cho trang con
        
        const grid = document.getElementById('plugin-grid');
        grid.innerHTML = DATABASE_PLUGINS.data.map(pl => `
            <div class="card animate">
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-size: 10px; opacity: 0.5;">ID: ${pl.id}</span>
                    <span style="font-size: 10px; color: var(--accent);">${pl.ver}</span>
                </div>
                <h3 style="margin: 20px 0 10px 0;">${pl.name}</h3>
                <p style="font-size: 14px;">Hệ thống tối ưu hóa hiệu năng cao dành cho dự án quốc tế.</p>
                <a href="#" class="btn" style="margin-top: 20px; font-size: 11px; padding: 8px 15px; display: inline-block;">DETAILS</a>
            </div>
        `).join('');
    </script>
</body>
</html>
