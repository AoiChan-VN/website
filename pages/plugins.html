<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins List | AoiChan</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/res/rs.css">
</head>
<body data-theme="dark">
    <div id="header-root"></div>

    <main class="container">
        <h2 style="margin-top:2rem">Danh sách Plugins</h2>
        <div id="plugin-list" class="grid">
            <!-- Data render từ pl-db.js thông qua core.js -->
        </div>
    </main>

    <div id="footer-root"></div>
    <script type="module">
        import { PLUGIN_DATA } from '../src/db/pl-db.js';
        const list = document.getElementById('plugin-list');
        list.innerHTML = PLUGIN_DATA.map(item => `
            <div class="card" id="${item.id}">
                <span class="tag-${item.tag}">${item.tag.toUpperCase()}</span>
                <h3>${item.name}</h3>
                <p>${item.description}</p>
                <small>Version: ${item.version}</small>
                <br><br>
                <a href="${item.link}" class="btn">Tải xuống</a>
            </div>
        `).join('');
    </script>
    <script type="module" src="../assets/js/core.js"></script>
</body>
</html>
