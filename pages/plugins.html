<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Plugins | AoiChan Vault</title>
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>
    <header></header>
    <main class="container">
        <h1 style="padding-top: 60px;">System <span style="color: var(--accent);">Plugins</span></h1>
        <div id="plugin-grid" class="grid-layout"></div>
    </main>
    <footer></footer>
    <script type="module">
        import { renderHeader } from '../src/components/header.js';
        import { renderFooter } from '../src/components/footer.js';
        import DATABASE_PLUGINS from '../src/db/pl-db.js';
        renderHeader(true);
        renderFooter();
        document.getElementById('plugin-grid').innerHTML = DATABASE_PLUGINS.data.map(pl => `
            <div class="card animate">
                <span class="tag-v">${pl.ver}</span>
                <h2 style="margin: 20px 0;">${pl.name}</h2>
                <a href="#" class="btn">DOCUMENTATION</a>
            </div>
        `).join('');
    </script>
</body>
</html>
