<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins Manager | AoiChan</title>
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>
    <header class="container">
        <div class="logo">AOICHAN</div>
        <nav><a href="../index.html">Quay lại Trang chủ</a></nav>
    </header>
    <main class="container">
        <div class="page-header">
            <h1>Plugins System</h1>
            <p>Danh sách các Plugin được phát triển bởi AoiChan.</p>
        </div>
        <div id="render-plugins" class="grid-layout"></div>
    </main>
    <script type="module">
        import DATABASE_PLUGINS from '../src/db/pl-db.js';
        const container = document.getElementById('render-plugins');
        container.innerHTML = DATABASE_PLUGINS.data.map(item => `
            <div class="card shadow" id="${item.id}">
                <div class="tag">${DATABASE_PLUGINS.tag}</div>
                <h2>${item.name}</h2>
                <p>Phiên bản: ${item.ver}</p>
                <a href="${item.path}" class="btn">Chi tiết</a>
            </div>
        `).join('');
    </script>
    <script src="../assets/js/security.js"></script>
</body>
</html>
