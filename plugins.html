<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins - MC Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="app-root"></div> <!-- Chứa Header & Settings -->
    <main><div id="content-list" class="grid-container"></div></main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js'; // Kích hoạt logic nhạc/theme

        document.getElementById('app-root').innerHTML = Header();

        // Render dữ liệu (Sửa "plugins" thành "resources" nếu ở trang resources.html)
        document.getElementById('content-list').innerHTML = siteData.plugins.map(item => `
            <div class="card">
                <img src="${item.img}" style="width:100%; height:180px; object-fit:cover;">
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <button onclick="window.viewDetail('${item.mdPath}')" class="btn-primary">Xem chi tiết</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
