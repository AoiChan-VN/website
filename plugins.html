<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦◞𝓟𝓵𝓾𝓰𝓲𝓷︵</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div class="page-header" style="padding: 40px 10% 0 10%;">
            <h2 class="section-title">🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷 𝓟𝓸𝓻𝓽𝓯𝓸𝓵𝓲𝓸</h2>
            <p style="opacity: 0.6;">Plugin độc quyền của Server.</p>
        </div>
        <div id="plugin-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        const container = document.getElementById('plugin-list');

        if (!siteData.plugins || siteData.plugins.length === 0) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">Chưa có dữ liệu Plugin nào được đăng tải.</div>`;
        } else {
            container.innerHTML = siteData.plugins.map(item => `
                <div class="card">
                    <div class="card-img-wrapper">
                        <img src="${item.img}" alt="${item.name}" loading="lazy">
                        <span class="version-tag">v${item.version}</span>
                    </div>
                    <div class="card-body">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <button onclick="window.viewDetail('${item.mdPath}')" class="btn-primary">Chi tiết</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
