<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản Phẩm Plugins</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="header-root"></div>

    <main style="padding: 20px 10%;">
        <h2 style="border-left: 5px solid var(--primary); padding-left: 15px;">Kho Plugins Nội Bộ</h2>
        <div id="plugin-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header, ProjectCard } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';

        // Khởi tạo giao diện
        document.getElementById('header-root').innerHTML = Header();
        
        // Đổ dữ liệu Plugins
        const container = document.getElementById('plugin-list');
        container.innerHTML = siteData.plugins.map(item => ProjectCard(item)).join('');
    </script>
</body>
</html>
