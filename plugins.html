<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./css/style.css">
    <title>Plugins - Minecraft Server</title>
</head>
<body>
    <div id="header-root"></div> <!-- Header tự động load -->

    <main>
        <h1>Danh sách Plugins nội bộ</h1>
        <div id="plugin-list" class="grid-container"></div>
    </main>

    <div id="footer-root"></div>

    <!-- Script điều khiển -->
    <script type="module">
        import { pluginsData } from './js/data/plugins.js';
        import { ProjectCard } from './js/components/ProjectCard.js';
        import { Header } from './js/components/Header.js';

        // Load Header
        document.getElementById('header-root').innerHTML = Header();

        // Render danh sách plugins
        const container = document.getElementById('plugin-list');
        container.innerHTML = pluginsData.map(item => ProjectCard(item)).join('');
    </script>
</body>
</html>
