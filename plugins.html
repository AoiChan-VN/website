<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷 | 𝐩𝐥𝐮𝐠𝐢𝐧𝐬</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>
    <main>
        <div style="padding: 40px 10% 0 10%;"><h2 style="border-left: 5px solid var(--primary); padding-left: 15px;">Dự Án Plugins</h2></div>
        <div id="plugin-list" class="grid-container"></div>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();
        document.getElementById('plugin-list').innerHTML = siteData.plugins.map(item => `
            <div class="card">
                <img src="${item.img}" style="width:100%; height:200px; object-fit:cover;">
                <div class="card-body">
                    <span style="color:var(--primary); font-size:0.8rem; font-weight:bold;">PHIÊN BẢN ${item.version}</span>
                    <h3 style="margin: 10px 0;">${item.name}</h3>
                    <p style="opacity:0.8; font-size:0.9rem; margin-bottom:20px;">${item.desc}</p>
                    <button onclick="window.viewDetail('${item.mdPath}')" class="btn-primary">Xem Chi Tiết</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
