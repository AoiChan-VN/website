<svg xmlns="http://w3.org" viewBox="0 0 400 150" preserveAspectRatio="none">
    <defs>
        <!-- Gradient đổ bóng vùng Area -->
        <linearGradient id="pteroGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:var(--primary); stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:var(--primary); stop-opacity:0" />
        </linearGradient>
        
        <!-- Hiệu ứng Glow rực rỡ cho đường Line -->
        <filter id="pteroGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Hiệu ứng chuyển động vẽ dây -->
        <style>
            .path-anim {
                stroke-dasharray: 1000;
                stroke-dashoffset: 1000;
                animation: dash 3s linear forwards;
            }
            @keyframes dash { to { stroke-dashoffset: 0; } }
        </style>
    </defs>
    
    <!-- Hệ thống lưới (Grid) chuẩn Dashboard Admin -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
        <!-- Đường ngang -->
        <line x1="0" y1="25%" x2="100%" y2="25%" />
        <line x1="0" y1="50%" x2="100%" y2="50%" />
        <line x1="0" y1="75%" x2="100%" y2="75%" />
        <!-- Đường dọc -->
        <line x1="20%" y1="0" x2="20%" y2="100%" />
        <line x1="40%" y1="0" x2="40%" y2="100%" />
        <line x1="60%" y1="0" x2="60%" y2="100%" />
        <line x1="80%" y1="0" x2="80%" y2="100%" />
    </g>

    <!-- Vùng phủ màu (Area) -->
    <path d="M0,130 Q50,70 100,100 T200,40 T300,80 T400,30 L400,150 L0,150 Z" 
          fill="url(#pteroGradient)" />
    
    <!-- Đường biểu đồ chính (Line) -->
    <path class="path-anim" 
          d="M0,130 Q50,70 100,100 T200,40 T300,80 T400,30" 
          fill="none" 
          stroke="var(--primary)" 
          stroke-width="2.5" 
          stroke-linecap="round"
          filter="url(#pteroGlow)" />
</svg>
