<svg xmlns="http://w3.org" viewBox="0 0 400 150">
    <defs>
        <!-- Dải màu hồng rực rỡ đổ xuống mờ dần -->
        <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff85a1; stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#ff85a1; stop-opacity:0" />
        </linearGradient>
        <!-- Hiệu ứng phát sáng cho đường kẻ -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Hệ thống lưới mờ (Làm cho biểu đồ chuyên nghiệp hơn) -->
    <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
        <line x1="0" y1="30" x2="400" y2="30" />
        <line x1="0" y1="60" x2="400" y2="60" />
        <line x1="0" y1="90" x2="400" y2="90" />
        <line x1="0" y1="120" x2="400" y2="120" />
    </g>

    <!-- Vùng phủ màu dưới đường biểu đồ -->
    <path d="M0,120 Q50,80 100,100 T200,40 T300,70 T400,20 L400,150 L0,150 Z" fill="url(#chartGradient)" />
    
    <!-- Đường kẻ chính (Có Glow) -->
    <path d="M0,120 Q50,80 100,100 T200,40 T300,70 T400,20" 
          fill="none" stroke="#ff85a1" stroke-width="3" 
          filter="url(#glow)" class="chart-path" />
</svg>
 
