<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://w3.org" viewBox="0 0 400 150" preserveAspectRatio="none">
    <defs>
        <linearGradient id="pteroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff85a1; stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#ff85a1; stop-opacity:0" />
        </linearGradient>
    </defs>
    <g stroke="rgba(255,255,255,0.05)" stroke-width="0.5">
        <line x1="0" y1="20%" x2="100%" y2="20%" />
        <line x1="0" y1="40%" x2="100%" y2="40%" />
        <line x1="0" y1="60%" x2="100%" y2="60%" />
        <line x1="0" y1="80%" x2="100%" y2="80%" />
    </g>
    <!-- Các ID này để JavaScript "bẻ" đường vẽ theo số liệu thật -->
    <path id="svg-area" d="M0,150 L0,150 L400,150 Z" fill="url(#pteroGrad)" />
    <path id="svg-line" d="M0,150 L400,150" fill="none" stroke="#ff85a1" stroke-width="2.5" stroke-linejoin="round" />
</svg>
