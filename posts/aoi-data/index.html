<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Aoi Post</title>

  <meta
    name="description"
    content="Aoi Post Page"
  />

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="../../assets/css/reset.css"
  />

  <link
    rel="stylesheet"
    href="../../assets/css/variables.css"
  />

  <link
    rel="stylesheet"
    href="../../assets/css/base.css"
  />

  <link
    rel="stylesheet"
    href="./assets/post.css"
  />

  <!-- JS -->
  <script
    type="module"
    src="./assets/post.js"
    defer
  ></script>
</head>

<body>

  <div class="post-shell">

    <!-- Background -->
    <div class="post-background">

      <img
        src="../../assets/images/background.webp"
        alt="Background"
        class="post-background-image"
      />

      <div class="post-background-overlay"></div>

    </div>

    <!-- Header -->
    <header class="post-header">

      <a
        href="../../index.html"
        class="post-back-button glass-card"
      >
        ← Back
      </a>

    </header>

    <!-- Main -->
    <main class="post-main">

      <article
        id="post-container"
        class="post-container glass-card"
      ></article>

    </main>

  </div>

</body>
</html>
