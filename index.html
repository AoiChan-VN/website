<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#050816"
  />

  <meta
    name="color-scheme"
    content="dark"
  />

  <title>Cosmic Fantasy Portal</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/animations.css" />
  <link rel="stylesheet" href="./assets/css/effects/parallax.css" />
  <link rel="stylesheet" href="./assets/css/effects/glassmorphism.css" />
  <link rel="stylesheet" href="./assets/css/effects/cosmic.css" />
  <link rel="stylesheet" href="./assets/css/main.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>

<body>

  <div class="app-shell">

    <div
      class="cosmic-background"
      aria-hidden="true"
    >
      <div class="cosmic-gradient"></div>
      <div class="cosmic-stars"></div>
      <div class="cosmic-glow"></div>
    </div>

    <div
      class="parallax-world"
      aria-hidden="true"
    >

      <div
        class="parallax-layer layer-back"
        data-depth="0.08"
      ></div>

      <div
        class="parallax-layer layer-mid"
        data-depth="0.16"
      ></div>

      <div
        class="parallax-layer layer-front"
        data-depth="0.24"
      ></div>

    </div>

    <main class="main-container">

      <section class="hero-panel glass-panel">

        <div class="hero-content">

          <span class="hero-tag">
            Fantasy • Cosmic • 4D Space
          </span>

          <h1 class="hero-title">
            Beyond The Infinite Horizon
          </h1>

          <p class="hero-description">
            Không gian huyễn tưởng đa tầng với
            hiệu ứng 3D parallax cinematic,
            tối ưu GPU cho mọi thiết bị.
          </p>

          <div class="hero-actions">

            <button
              type="button"
              class="primary-button"
              aria-label="Explore Universe"
            >
              Explore Universe
            </button>

            <button
              type="button"
              class="secondary-button"
              aria-label="Enter Portal"
            >
              Enter Portal
            </button>

          </div>

        </div>

      </section>

    </main>

  </div>

  <script
    type="module"
    src="./assets/js/main.js"
  ></script>

</body>
</html>
