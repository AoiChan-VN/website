<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AoiChan Portfolio - Plugins & Resources">
    <meta name="author" content="AoiChan">
    <title>AoiChan | Premium Portfolio</title>
    <!-- CSS được gọi chính xác từ thư mục assets -->
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/res/rs.css">
</head>
<body data-theme="dark">

    <header class="glass-header">
        <div class="container flex-between">
            <div class="logo-area">
                <img src="./assets/img/logo/logo.png" alt="AoiChan" class="logo">
                <span>AOICHAN</span>
            </div>
            <div class="header-controls">
                <button onclick="Core.openPanel('menu')" class="menu-trigger">Menu System</button>
            </div>
        </div>
    </header>

    <main class="hero-wrapper">
        <div class="hero-glow"></div>
        <div class="container">
            <div class="hero-content">
                <h1 class="fade-in">AoiChan Project</h1>
                <p class="fade-in-delay">Nền tảng cung cấp Plugins và Resource Packs Minecraft chuẩn quốc tế.</p>
                <div class="hero-actions fade-in-delay-2">
                    <button onclick="Core.openPanel('plugins')" class="btn-main">Plugins List</button>
                    <button onclick="Core.openPanel('resource')" class="btn-sub">Resources</button>
                </div>
            </div>
        </div>
    </main>

    <!-- SPA SYSTEM: PANEL OVERLAY -->
    <div id="settings-panel" class="settings-overlay">
    <div class="settings-content">
        <div class="settings-header">
            <h3>Configuration</h3>
            <button onclick="Core.toggleSettings()" class="close-btn">&times;</button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <span>Giao diện (Theme)</span>
                <select id="theme-select" onchange="Core.changeTheme(this.value)">
                    <option value="dark">Dark Ocean</option>
                    <option value="light">Pure Light</option>
                    <option value="amoled">Amoled Black</option>
                </select>
            </div>
            <div class="setting-item">
                <span>Ngôn ngữ (Language)</span>
                <select id="lang-select" onchange="Core.changeLang(this.value)">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>
    </div>
    <footer id="footer-root"></footer>

    <!-- Khởi tạo Logic -->
    <script type="module" src="./assets/js/core.js"></script>
</body>
</html>
