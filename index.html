<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Native Space Portal</title>

    <!-- CORE CSS -->
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/root.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/portal-ui.css" />

</head>

<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div id="loading-logo-wrapper">
            <img
                id="loading-logo"
                src="./assets/images/logo/logo.png"
                alt="Portal Logo"
            />
        </div>

        <div id="loading-text">
            INITIALIZING PORTAL ENGINE...
        </div>
    </div>

    <!-- MAIN APPLICATION -->
    <main id="app">

        <!-- PORTAL VIEWPORT -->
        <section id="portal-viewport">

            <!-- IMAGE MATRIX -->
            <div id="matrix-layer">

                <!-- CENTER -->
                <img
                    class="portal-frame"
                    id="portal-center"
                    src="./assets/images/portal/center.webp"
                    alt="center"
                />

                <!-- NORTH -->
                <img
                    class="portal-frame"
                    id="portal-north"
                    src="./assets/images/portal/north.webp"
                    alt="north"
                />

                <!-- SOUTH -->
                <img
                    class="portal-frame"
                    id="portal-south"
                    src="./assets/images/portal/south.webp"
                    alt="south"
                />

                <!-- EAST -->
                <img
                    class="portal-frame"
                    id="portal-east"
                    src="./assets/images/portal/east.webp"
                    alt="east"
                />

                <!-- WEST -->
                <img
                    class="portal-frame"
                    id="portal-west"
                    src="./assets/images/portal/west.webp"
                    alt="west"
                />

                <!-- NORTH EAST -->
                <img
                    class="portal-frame"
                    id="portal-north-east"
                    src="./assets/images/portal/north-east.webp"
                    alt="north east"
                />

                <!-- NORTH WEST -->
                <img
                    class="portal-frame"
                    id="portal-north-west"
                    src="./assets/images/portal/north-west.webp"
                    alt="north west"
                />

                <!-- SOUTH EAST -->
                <img
                    class="portal-frame"
                    id="portal-south-east"
                    src="./assets/images/portal/south-east.webp"
                    alt="south east"
                />

                <!-- SOUTH WEST -->
                <img
                    class="portal-frame"
                    id="portal-south-west"
                    src="./assets/images/portal/south-west.webp"
                    alt="south west"
                />

            </div>

            <!-- OVERLAY -->
            <div id="portal-overlay"></div>

            <!-- HUD -->
            <div id="hud-container">

                <div class="hud-panel" id="hud-left">
                    <span>GYRO MATRIX</span>
                    <span id="gyro-status">READY</span>
                </div>

                <div class="hud-panel" id="hud-right">
                    <span>FPS</span>
                    <span id="fps-counter">0</span>
                </div>

            </div>

        </section>

    </main>

    <!-- CORE -->
    <script type="module" src="./core/engine.js"></script>

</body>
</html>
