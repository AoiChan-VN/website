<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#080b14"
  />

  <meta
    name="description"
    content="Aoi Chan Personal Interface"
  />

  <title>Aoi Chan</title>

  <link
    rel="icon"
    href="./assets/icons/logo.png"
    type="image/svg+xml"
  />

  <link
    rel="manifest"
    href="./manifest/aoi.webmanifest"
  />

  <link
    rel="preload"
    href="./assets/fonts/inter/inter-variable.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />

  <link
    rel="stylesheet"
    href="./assets/css/main.css"
  />

</head>

<body>

  <div class="app-shell">

    <div class="bg-layer bg-image"></div>
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-noise"></div>

    <aside class="sidebar">

      <div class="sidebar-top">

        <a
          href="#/home"
          class="logo-wrap"
        >

          <img
            src="./assets/icons/logo.png"
            alt="Aoi"
            class="logo-image"
          />

        </a>

      </div>

      <nav class="sidebar-nav">

        <a
          href="#/home"
          class="nav-item"
          data-route="home"
        >
          Home
        </a>

        <a
          href="#/posts"
          class="nav-item"
          data-route="posts"
        >
          Posts
        </a>

        <a
          href="#/gallery"
          class="nav-item"
          data-route="gallery"
        >
          Gallery
        </a>

      </nav>

    </aside>

    <div class="main-layout">

      <header class="topbar">

        <div class="topbar-left">

          <span class="status-dot"></span>

          <span class="status-text">
            ONLINE
          </span>

        </div>

        <div class="topbar-right">

          <button
            id="motion-toggle"
            class="top-button"
            type="button"
          >
            Motion
          </button>

        </div>

      </header>

      <main
        id="app-view"
        class="app-view"
      ></main>

    </div>

  </div>

  <div
    id="overlay-panel"
    class="overlay-panel hidden"
  >

    <div class="overlay-box">

      <button
        id="overlay-close"
        class="overlay-close"
        type="button"
      >
        ×
      </button>

      <div id="overlay-content"></div>

    </div>

  </div>

  <script
    type="module"
    src="./assets/js/bootstrap.js"
  ></script>

</body>
</html>
