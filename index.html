<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <!-- 1. BẢO MẬT & META CƠ BẢN -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- Content Security Policy (CSP): Chống XSS và Script độc hại từ bên ngoài -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">

    <title>Portfolio Professional | Senior Developer</title>
    <meta name="description" content="Portfolio SPA chuẩn quốc tế - Plugins, Resource Packs & Youtube Channel">
    
    <!-- Favicon chuẩn mọi thiết bị -->
    <link rel="icon" type="image/png" href="public/assets/images/favicon.png">

    <!-- 2. HỆ THỐNG STYLES TÁCH BIỆT -->
    <!-- Load CSS quan trọng trước để tránh tình trạng layout bị giật (CLS) -->
    <link rel="stylesheet" href="src/styles/base.css">
    <link rel="stylesheet" href="src/styles/layout.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/responsive.css">

    <!-- Preload Data quan trọng -->
    <link rel="modulepreload" href="./src/app.js">
</head>
<body>

    <!-- 3. CẤU TRÚC LAYOUT -->
    <div id="app">
        <!-- Header: Cố định cho SPA -->
        <header class="main-header">
            <nav class="nav-container">
                <a href="#/" class="logo" data-link>DEV-PORTFOLIO</a>
                <ul class="nav-links">
                    <li><a href="#/" data-link>Trang chủ</a></li>
                    <li><a href="#/plugins" data-link>Plugins</a></li>
                    <li><a href="#/resources" data-link>Resource Packs</a></li>
                    <li><a href="#/youtube" data-link>Youtube</a></li>
                    <li><a href="#/download" data-link class="btn-download">Tải về</a></li>
                </ul>
                <!-- Mobile Menu Toggle -->
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <span class="bar"></span>
                </button>
            </nav>
        </header>

        <!-- Main Content: Nơi Render SPA linh hoạt -->
        <main id="main-content" class="fade-in">
            <!-- Loading State mặc định -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2024 YourName. Build with Clean Architecture.</p>
        </footer>
    </div>

    <!-- 4. KHỞI TẠO SPA ENGINE -->
    <script type="module" src="src/app.js"></script>

    <!-- Noscript Security -->
    <noscript>
        <div style="text-align: center; padding: 50px;">
            Trình duyệt của bạn không hỗ trợ JavaScript. Vui lòng bật để trải nghiệm Website.
        </div>
    </noscript>
</body>
</html>
