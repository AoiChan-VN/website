<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoiChan | Matrix 2026</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <header></header>
    <main class="container">
        <section style="padding: 10vh 0;">
            <h1 class="animate">Engineering <br><span style="color: var(--accent);">Excellence.</span></h1>
            <p style="margin-top: 20px; max-width: 600px;">Hệ thống Portfolio tối giản, mượt mà và tự thích ứng tuyệt đối.</p>
        </section>
        <div class="grid-layout" id="index-grid"></div>
    </main>
    <footer></footer>

    <script type="module">
        import { App } from './assets/js/core.js';
        import DATABASE_PLUGINS from './src/db/pl-db.js';
        
        // Khởi tạo render ban đầu
        App.reinitPage();
        
        const grid = document.getElementById('index-grid');
        grid.innerHTML = DATABASE_PLUGINS.data.map(p => `
            <div class="card animate">
                <span style="font-size: 10px; color: var(--accent); border: 1px solid; padding: 2px 8px; border-radius: 10px;">${p.ver}</span>
                <h3 style="margin: 20px 0 10px 0;">${p.name}</h3>
                <p>Advanced system module for high-end performance.</p>
            </div>
        `).join('');
    </script>
</body>
</html>
