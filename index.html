<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSG Animation Dynamic Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">VSG</div>
            <ul class="nav-links">
                <li class="active">Dashboard</li>
                <li>Analytics</li>
                <li>Projects</li>
                <li>Settings</li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Dynamic Overview</h1>
                <div class="user-profile">Admin</div>
            </header>

            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="card pulse">
                    <h3>Traffic</h3>
                    <p id="traffic-count">0</p>
                </div>
                <div class="card pulse">
                    <h3>Performance</h3>
                    <p>98%</p>
                </div>
                <div class="card pulse">
                    <h3>Uptime</h3>
                    <p>24/7</p>
                </div>
            </section>

            <!-- Chart Section (SVG Vanilla) -->
            <section class="chart-container">
                <h3>Live Activity (Vanilla SVG)</h3>
                <svg viewBox="0 0 500 100" class="chart-svg">
                    <polyline fill="none" stroke="#00ff88" stroke-width="3" points="" id="dynamic-line"/>
                </svg>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
