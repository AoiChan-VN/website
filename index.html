<div class="dashboard-card">
    <div class="card-header">
        <span>Network Activity</span>
        <div class="status-dot"></div>
    </div>
    
    <!-- Area dành cho SVG Animation -->
    <div class="svg-container">
        <svg viewBox="0 0 200 100" preserveAspectRatio="none">
            <!-- Lớp phủ màu Gradient -->
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:rgba(0, 242, 254, 0.2)" />
                    <stop offset="100%" style="stop-color:transparent" />
                </linearGradient>
            </defs>
            <!-- Vùng đổ màu phía dưới đồ thị -->
            <path id="visual-area" fill="url(#gradient)" d=""></path>
            <!-- Đường line đồ thị chính -->
            <path id="visual-line" fill="none" stroke="#00f2fe" stroke-width="2" d=""></path>
        </svg>
    </div>

    <div class="card-footer">
        <div class="stat-item">
            <small>Uplink</small>
            <strong>24.5 Mbps</strong>
        </div>
        <div class="stat-item">
            <small>Delay</small>
            <strong>12 ms</strong>
        </div>
    </div>
</div>
