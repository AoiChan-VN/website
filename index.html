<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Control Panel</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body class="pterodactyl-theme">
    <div id="layout-root"></div>

    <div class="panel-container">

        <!-- CONTENT BÊN PHẢI -->
        <main class="main-content">
            <!-- TOP BAR -->
            <header class="content-header">
                <div class="header-info">
                    <h2 id="srv-name-display">My Minecraft Server</h2>
                    <span class="status-indicator" id="srv-status-badge">Checking...</span>
                </div>
                <div class="header-actions">
                    <button class="btn-ctrl start" onclick="serverAction('start')">START</button>
                    <button class="btn-ctrl restart" onclick="serverAction('restart')">RESTART</button>
                    <button class="btn-ctrl stop" onclick="serverAction('stop')">STOP</button>
                </div>
            </header>

            <!-- DASHBOARD WIDGETS -->
            <div class="widgets-grid">
                <!-- Biểu đồ Line Chart (Dữ liệu thật) -->
                <div class="card widget-box chart-main">
                    <div class="box-head">MEMORY USAGE</div>
                    <div id="chart-container" class="chart-inner">
                        <!-- SVG trượt từ file riêng -->
                    </div>
                </div>

                <!-- Thông số Server (Dữ liệu thật) -->
                <div class="card widget-box">
                    <div class="box-head">SERVER INFORMATION</div>
                    <div class="info-list">
                        <div class="info-row"><span>Address:</span> <code id="srv-ip-val">Loading...</code></div>
                        <div class="info-row"><span>Players:</span> <strong id="srv-players-val">0/0</strong></div>
                        <div class="info-row"><span>Version:</span> <strong id="srv-version-val">-</strong></div>
                        <div class="info-row"><span>Uptime:</span> <strong id="srv-uptime">Online</strong></div>
                    </div>
                </div>

                <!-- Backup & Disk Usage -->
                <div class="card widget-box">
                    <div class="box-head">DISK & BACKUP</div>
                    <div class="stats-mini">
                        <div class="circle-box">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="ring-bg" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                                <circle id="disk-progress" class="ring-active" stroke="var(--primary)" stroke-width="6" stroke-dasharray="213.6" stroke-dashoffset="50" fill="transparent" r="34" cx="40" cy="40"/>
                            </svg>
                            <span class="ring-text">75%</span>
                        </div>
                        <div class="stat-text">9.124 MB / 12 GB</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();

        // API THẬT - Lấy dữ liệu từ mcsrvstat.us
        async function loadServerData() {
            const ip = siteData.settings.serverIP || "mc.hypixel.net";
            document.getElementById('srv-ip-val').innerText = ip;
            try {
                const res = await fetch(`https://mcsrvstat.us{ip}`);
                const data = await res.json();
                const badge = document.getElementById('srv-status-badge');
                if(data.online) {
                    badge.innerText = "ONLINE"; badge.className = "status-indicator online";
                    document.getElementById('srv-players-val').innerText = `${data.players.online}/${data.players.max}`;
                    document.getElementById('srv-version-val').innerText = data.version;
                } else {
                    badge.innerText = "OFFLINE"; badge.className = "status-indicator offline";
                }
            } catch(e) { console.log("API Error"); }
        }

        // Tải biểu đồ SVG
        async function loadChart() {
            const res = await fetch('./assets/vectors/chart.svg');
            document.getElementById('chart-container').innerHTML = await res.text();
        }

        window.serverAction = (act) => alert("Hành động: " + act.toUpperCase() + " đang được gửi tới Server...");

        loadServerData();
        loadChart();
    </script>
</body>
</html>
