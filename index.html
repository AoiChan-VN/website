<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Data Driven Portfolio</title>

  <link rel="stylesheet" href="./assets/styles/root.css">
  <link rel="stylesheet" href="./assets/styles/layout.css">
  <link rel="stylesheet" href="./assets/styles/cards.css">
  <link rel="stylesheet" href="./assets/styles/panel.css">
  <link rel="stylesheet" href="./assets/styles/animations.css">
</head>

<body>

  <div class="app-shell">

    <header class="hero-header">
      <img
        src="./assets/images/logo.webp"
        class="hero-header__logo"
        alt="Logo"
      >

      <div class="hero-header__content">
        <h1 class="hero-header__title">
          DATA DRIVEN SYSTEM
        </h1>

        <p class="hero-header__subtitle">
          VanillaJS • High-End UI • JSON Powered
        </p>
      </div>
    </header>

    <main>
      <section
        id="card-container"
        class="cards-grid"
      ></section>
    </main>

  </div>

  <div
    id="panel-viewer"
    class="panel-viewer"
  >
    <div class="panel-viewer__backdrop"></div>

    <div class="panel-viewer__container">

      <button
        id="panel-close"
        class="panel-viewer__close"
      >
        ✕
      </button>

      <div
        id="panel-content"
        class="panel-viewer__content"
      ></div>

    </div>
  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
