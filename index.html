<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Aoi | Universal 🌍</title>

    <meta
        name="color-scheme"
        content="dark"
    >

    <link
        rel="stylesheet"
        href="./assets/css/reset.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/theme.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/layout.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/components.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/animations.css"
    >

</head>

<body>

    <div class="bg-gradient"></div>

    <header class="topbar glass">

        <div class="brand">
            UNIVERSAL.RUNTIME
        </div>

        <input
            id="searchInput"
            class="search"
            type="text"
            placeholder="Search..."
            autocomplete="off"
        >

    </header>

    <main>

        <section class="hero">

            <div class="hero-content">

                <h1>
                    Universal Static Runtime
                </h1>

                <p>
                    Zero Framework • Zero Backend • Pure Static
                </p>

            </div>

        </section>

        <section
            id="grid"
            class="grid"
        >

            <div class="loading-grid">

                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>

            </div>

        </section>

    </main>

    <!-- FILE:// FALLBACK -->

    <script
        type="application/json"
        id="embedded-profile"
    >
    {
        "version":1,

        "items":[
            "macbook",
            "rtx5090",
            "anime-pack"
        ]
    }
    </script>

    <script
        type="module"
        src="./assets/js/app.js"
    ></script>

</body>
</html>
