<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#070b17"
  />

  <title>Aoi Chan</title>

  <link
    rel="preload"
    href="./assets/images/background/main-bg.webp"
    as="image"
  />

  <link
    rel="stylesheet"
    href="./assets/css/app.css"
  />

</head>

<body>

  <div class="app">

    <div class="ambient-layer ambient-back"></div>
    <div class="ambient-layer ambient-light"></div>

    <header class="topbar">

      <div class="brand">

        <img
          src="./assets/icons/logo.svg"
          alt="Aoi Logo"
          class="brand-logo"
        />

        <div class="brand-meta">

          <h1 class="brand-title">
            AOI CHAN
          </h1>

          <p class="brand-subtitle">
            Personal Interface
          </p>

        </div>

      </div>

      <nav class="topbar-nav">

        <button
          class="nav-button active"
          type="button"
        >
          Home
        </button>

        <button
          class="nav-button"
          type="button"
        >
          Posts
        </button>

      </nav>

    </header>

    <main class="main-shell">

      <section class="hero-shell">

        <div class="hero-left">

          <div class="hero-badge">
            IOS • Anime • Huyền Huyễn
          </div>

          <h2 class="hero-title">
            Cinematic
            <span>
              Personal Space
            </span>
          </h2>

          <p class="hero-description">
            Static GitHub website với kiến trúc
            production-grade Vanilla JS.
          </p>

        </div>

        <div class="hero-right">

          <div class="hero-orb"></div>

        </div>

      </section>

      <section
        id="cards"
        class="cards-grid"
      ></section>

    </main>

    <div
      id="panel"
      class="panel hidden"
    >

      <div class="panel-box">

        <button
          id="panel-close"
          class="panel-close"
          type="button"
        >
          ×
        </button>

        <div id="panel-content"></div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="./assets/js/app.js"
  ></script>

</body>
</html>
