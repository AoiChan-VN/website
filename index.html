<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#050816"
  />

  <meta
    name="color-scheme"
    content="dark"
  />

  <meta
    name="description"
    content="Cinematic fantasy space website built with native HTML5, CSS and Vanilla JavaScript."
  />

  <title>Cosmic Fantasy Portal</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/animations.css" />
  <link rel="stylesheet" href="./assets/css/effects/parallax.css" />
  <link rel="stylesheet" href="./assets/css/effects/glassmorphism.css" />
  <link rel="stylesheet" href="./assets/css/effects/cosmic.css" />
  <link rel="stylesheet" href="./assets/css/components/navigation.css" />
  <link rel="stylesheet" href="./assets/css/components/orbital.css" />
  <link rel="stylesheet" href="./assets/css/components/particles.css" />
  <link rel="stylesheet" href="./assets/css/components/cursor.css" />
  <link rel="stylesheet" href="./assets/css/components/reveal.css" />
  <link rel="stylesheet" href="./assets/css/components/aurora.css" />
  <link rel="stylesheet" href="./assets/css/components/loading.css" />
  <link rel="stylesheet" href="./assets/css/components/mobile-menu.css" />
  <link rel="stylesheet" href="./assets/css/main.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>

<body>

<div class="app-shell">

  <div
    class="space-scene"
    aria-hidden="true"
  >

    <img
      src="./assets/images/space/stars-back.webp"
      alt=""
      class="scene-layer scene-stars"
      loading="eager"
      decoding="async"
    />

    <img
      src="./assets/images/space/nebula-mid.webp"
      alt=""
      class="scene-layer scene-nebula"
      loading="eager"
      decoding="async"
    />

    <img
      src="./assets/images/space/fog-overlay.webp"
      alt=""
      class="scene-layer scene-fog"
      loading="eager"
      decoding="async"
    />

    <img
      src="./assets/images/space/planet-front.webp"
      alt=""
      class="scene-planet"
      loading="eager"
      decoding="async"
    />

    <img
      src="./assets/images/space/orbital-ring.webp"
      alt=""
      class="scene-ring"
      loading="eager"
      decoding="async"
    />

    <div class="scene-cinematic">

      <img
        src="./assets/images/space/volumetric-light.webp"
        alt=""
        class="scene-light"
        loading="lazy"
        decoding="async"
      />

      <img
        src="./assets/images/space/cosmic-grid.webp"
        alt=""
        class="scene-grid"
        loading="lazy"
        decoding="async"
      />

      <img
        src="./assets/images/space/asteroid-front.webp"
        alt=""
        class="scene-asteroid"
        loading="lazy"
        decoding="async"
      />

      <img
        src="./assets/images/space/glow-particles.webp"
        alt=""
        class="scene-particles-overlay"
        loading="lazy"
        decoding="async"
      />

    </div>

  </div>
  
    <div class="mobile-overlay">

      <aside class="mobile-menu">

        <nav
          class="mobile-navigation-links"
          aria-label="Mobile Navigation"
        >

          <a
            href="#explore"
            class="mobile-navigation-link"
          >
            Explore
          </a>

          <a
            href="#dimensions"
            class="mobile-navigation-link"
          >
            Dimensions
          </a>

          <a
            href="#gateway"
            class="mobile-navigation-link"
          >
            Gateway
          </a>

        </nav>

      </aside>

    </div>

    <header class="space-navigation reveal">

      <nav
        class="navigation-shell glass-panel"
        aria-label="Primary Navigation"
      >

        <div class="navigation-brand">

          <img
            src="./assets/images/logo/logo-orb.webp"
            alt="Cosmic Portal Logo"
            class="brand-logo"
            loading="eager"
            decoding="async"
          />

          <span class="brand-title">
            Cosmic Portal
          </span>

        </div>

        <div class="navigation-links">

          <a
            href="#explore"
            class="navigation-link"
          >
            Explore
          </a>

          <a
            href="#dimensions"
            class="navigation-link"
          >
            Dimensions
          </a>

          <a
            href="#gateway"
            class="navigation-link"
          >
            Gateway
          </a>

        </div>

        <button
          type="button"
          class="mobile-menu-toggle"
          aria-label="Open Mobile Menu"
          aria-expanded="false"
        >
          ☰
        </button>

      </nav>

    </header>

    <main class="main-container">

      <section
        class="hero-panel glass-panel reveal"
        id="explore"
      >

        <div class="hero-content">

          <span class="hero-tag">
            Fantasy • Space • 4D Environment
          </span>

          <h1 class="hero-title">
            Beyond The Infinite Horizon
          </h1>

          <p class="hero-description">
            Cinematic layered fantasy environment
            với volumetric depth rendering,
            orbital composition và real visual
            parallax architecture.
          </p>

          <div class="hero-actions">

            <button
              type="button"
              class="primary-button"
            >
              Explore Universe
            </button>

            <button
              type="button"
              class="secondary-button"
            >
              Enter Portal
            </button>

          </div>

        </div>

      </section>

    </main>

  </div>

  <script
    type="module"
    src="./assets/js/main.js"
  ></script>

</body>
</html>
