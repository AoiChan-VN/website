<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ | 🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷◡</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>

    <main style="padding: 40px 8%;">
        <div class="page-header">
            <h2 class="section-title">Hệ Thống Quản Trị</h2>
            <p>| Giám sát tài nguyên máy chủ thời gian thực.</p>
        </div>

        <!-- DASHBOARD CONTAINER (Khung chính giống Pterodactyl) -->
        <section class="dashboard-v3">
            
            <!-- Card 1: Console & Biểu đồ (Chiếm 2/3 bề ngang) -->
            <div class="card ptero-card console-box">
                <div class="ptero-card-header">
                    <span class="ptero-title">DASHBOARD MONITOR</span>
                    <div class="ptero-actions">
                        <button class="ptero-btn start" onclick="serverAction('start')">START</button>
                        <button class="ptero-btn restart" onclick="serverAction('restart')">RESTART</button>
                        <button class="ptero-btn stop" onclick="serverAction('stop')">STOP</button>
                    </div>
                </div>
                <div class="ptero-card-body">
                    <!-- Khu vực Biểu đồ SVG External -->
                    <div id="chart-root" class="ptero-chart-container"></div>
                </div>
            </div>

            <!-- Card 2: Thông số Disk/Data (Dữ liệu thật từ API) -->
            <div class="card ptero-card info-box">
                <div class="ptero-card-header">
                    <span class="ptero-title">SERVER INFORMATION</span>
                </div>
                <div class="ptero-card-body">
                    <div class="ptero-info-row">
                        <span>Trạng thái:</span>
                        <strong id="srv-status" class="status-offline">OFFLINE</strong>
                    </div>
                    <div class="ptero-info-row">
                        <span>Người chơi:</span>
                        <strong id="srv-players">0 / 0</strong>
                    </div>
                    <div class="ptero-info-row">
                        <span>Dung lượng Disk:</span>
                        <strong id="srv-disk">9.124 MB / 12 GB</strong>
                    </div>
                    <!-- Thanh tiến trình Disk (Xịn sò) -->
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" style="width: 75%;"></div>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();

        // LOAD SVG BIỂU ĐỒ (Dùng lại bản SVG xịn của anh)
        async function loadChart() {
            const res = await fetch('./assets/vectors/chart.svg');
            document.getElementById('chart-root').innerHTML = await res.text();
        }
        loadChart();

        // GỌI API THẬT (mcsrvstat.us)
        async function getRealData() {
            const ip = siteData.settings.serverIP || "mc.hypixel.net";
            try {
                const res = await fetch(`https://mcsrvstat.us{ip}`);
                const data = await res.json();
                const status = document.getElementById('srv-status');
                if(data.online) {
                    status.innerText = "ONLINE";
                    status.className = "status-online";
                    document.getElementById('srv-players').innerText = `${data.players.online} / ${data.players.max}`;
                }
            } catch(e) { console.error("API error"); }
        }
        getRealData();

        window.serverAction = (type) => alert(`Hành động ${type.toUpperCase()} đã được gửi!`);
    </script>
</body>
</html>
