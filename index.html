<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Full Stack Engineer | Portfolio</title>
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <link rel="stylesheet" href="styles/root.css">
    <link rel="stylesheet" href="styles/layout.css">
    
    <!-- Anti-Clickjacking -->
    <style id="antiClickjack">body { display: none !important; }</style>
    <script>
        if (self === top) {
            document.getElementById('antiClickjack').parentNode.removeChild(document.getElementById('antiClickjack'));
        } else {
            top.location = self.location;
        }
    </script>
</head>
<body>
    <header class="main-header">
        <nav id="main-nav">
            <a href="/" data-link>Home</a>
            <a href="/plugins" data-link>Plugins</a>
            <a href="/resource" data-link>Resources</a>
        </nav>
    </header>

    <main id="app-root">
        <!-- Content injected by router.js -->
    </main>

    <footer class="main-footer">
        <p>&copy; 2024 Built with Vanilla JS</p>
    </footer>

    <script type="module" src="scripts/core/router.js"></script>
</body>
</html>
