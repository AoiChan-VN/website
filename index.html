<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoiChan Portfolio | Administrator</title>
    <!-- Favicon chuẩn thương hiệu -->
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <!-- File CSS tổng (import tất cả module CSS) -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- 1. Vùng chứa Header & Modal Settings -->
    <div id="layout-root"></div>
    
    <!-- 2. Vùng chứa nội dung động (Home, Plugins, Youtube, Download) -->
    <main id="page-content" style="transition: opacity 0.3s ease;"></main>

    <!-- 3. Bộ não điều hướng (Router) - QUAN TRỌNG NHẤT -->
    <!-- Phải để type="module" thì các lệnh import mới chạy được -->
    <script type="module" src="./js/router.js"></script>

    <!-- Fallback nếu trình duyệt không hỗ trợ JS -->
    <noscript>
        <div style="text-align: center; padding: 50px; color: white; background: #0b0f1a;">
            Website yêu cầu JavaScript để hoạt động. Vui lòng bật lại trong cài đặt trình duyệt.
        </div>
    </noscript>
</body>
</html>
