<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊Home</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>

<main style="padding: 40px 8%;">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 class="section-title">🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷 𝓟𝓸𝓻𝓽𝓯𝓸𝓵𝓲𝓸🎐</h2>
            <p>|◞𝓒𝓸𝓹𝔂𝓻𝓲𝓰𝓱𝓽◡𝓐𝓸𝓲𝓒𝓱𝓪𝓷◦</p>
        </div>
        <button onclick="window.toggleDashboard()" class="btn-primary" style="width:auto; padding: 10px 25px; border-radius: 50px;">
            📊Dashboard
        </button>
    </div>

    <!-- Dashboard Area -->
    <section id="dashboard-area" class="analytics-container" style="display: none;">
        
        <!-- Bên Trái: Biểu đồ tăng trưởng (SVG Line Chart) -->
        <div class="card glass-panel chart-box">
            <div class="panel-header">
                <h3>📈 Biểu đồ</h3>
                <span class="live-tag">𝓛𝓲𝓿𝓮</span>
            </div>
            <div class="svg-wrapper">
                <svg viewBox="0 0 400 150" class="line-chart-svg">
                    <!-- Đồ thị dạng sóng -->
                    <path class="chart-path" d="M0,120 Q50,80 100,100 T200,40 T300,70 T400,20" fill="none" stroke="var(--primary)" stroke-width="3" />
                    <path class="chart-fill" d="M0,120 Q50,80 100,100 T200,40 T300,70 T400,20 L400,150 L0,150 Z" fill="url(#grad)" opacity="0.2" />
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--primary);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--primary);stop-opacity:0" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="stats-row">
                <div class="stat-mini"><span>Plugins</span><strong id="p-val">0</strong></div>
                <div class="stat-mini"><span>Resources</span><strong id="r-val">0</strong></div>
                <div class="stat-mini"><span>Total</span><strong id="t-val">0</strong></div>
            </div>
        </div>

        <!-- Bên Phải: Bảng nhật ký -->
        <div class="card glass-panel log-box">
            <div class="panel-header">
                <h3>📄 Dữ liệu</h3>
            </div>
            <div class="log-list" id="log-list">
                <!-- Dữ liệu sẽ tự đổ vào đây -->
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { Header } from './js/components/Layout.js';
    import { siteData } from './js/data/database.js';
    import './js/main.js';

    document.getElementById('layout-root').innerHTML = Header();

    window.toggleDashboard = () => {
        const el = document.getElementById('dashboard-area');
        el.style.display = el.style.display === 'none' ? 'grid' : 'none';
        
        // Cập nhật số liệu thật
        const p = siteData.plugins.length;
        const r = siteData.resources.length;
        document.getElementById('p-val').innerText = p;
        document.getElementById('r-val').innerText = r;
        document.getElementById('t-val').innerText = p + r;

        // Đổ nhật ký
        const list = document.getElementById('log-list');
        list.innerHTML = [...siteData.plugins, ...siteData.resources].map(item => `
            <div class="log-item">
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-date">v${item.version || '1.0'} ❥</span>
                </div>
                <div class="status-dot"></div>
            </div>
        `).join('');
    };
</script>
</body>
</html>
