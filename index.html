<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoiChan | Portfolio</title>
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body data-theme="dark">
    <!-- Header tối giản -->
    <header class="glass-header">
        <div class="container flex-between">
            <img src="assets/img/logo/logo.png" alt="AoiChan" class="logo">
            <div class="header-controls">
                <button id="theme-toggle" class="btn-icon">🌓</button>
                <button id="menu-open" class="btn-menu">MENU</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="hero">
        <div class="hero-content">
            <h1>Chào mừng đến với thế giới của AoiChan</h1>
            <p>Giải pháp Minecraft chuyên sâu và tối ưu.</p>
            <div class="hero-btns">
                <button onclick="Core.openPanel('plugins')" class="btn-primary">Khám phá Plugins</button>
                <button onclick="Core.openPanel('resource')" class="btn-secondary">Resource Packs</button>
            </div>
        </div>
    </main>

    <!-- SPA PANEL (Cực quan trọng) -->
    <div id="app-panel" class="panel-overlay">
        <div class="panel-header">
            <button id="panel-close" class="btn-close">&times;</button>
            <h2 id="panel-title">Tiêu đề</h2>
        </div>
        <div id="panel-content" class="panel-body container">
            <!-- Nội dung các trang con sẽ render vào đây -->
        </div>
    </div>

    <div id="footer-root"></div>
    <script type="module" src="assets/js/core.js"></script>
</body>
</html>
