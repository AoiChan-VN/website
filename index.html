<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊Home</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>

    <main style="padding-top: 40px;">
        <!-- Phần mở đầu có hiệu ứng chữ trượt từ vạch hồng -->
        <div class="page-header" style="padding: 0 10%;">
            <h2 class="section-title">🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷 𝓟𝓸𝓻𝓽𝓯𝓸𝓵𝓲𝓸</h2>
            <p>| 🌊𝓒𝓸𝓹𝔂𝓻𝓲𝓰𝓱𝓽◡𝓐𝓸𝓲𝓒𝓱𝓪𝓷◦👻</p>
        </div>

        <!-- Bảng thống kê 3 cột -->
        <section class="grid-container" style="padding-top: 50px;">
            <div class="card stat-card">
                <div class="card-body">
                    <h3>Plugins</h3>
                    <div class="stat-value" id="count-plugins">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="card-body">
                    <h3>Resource Packs</h3>
                    <div class="stat-value" id="count-resources">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="card-body">
                    <h3>Lượt truy cập & Tải</h3>
                    <div class="stat-value">999+</div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();

        // Tự động đếm số lượng từ database để hiện lên bảng
        document.getElementById('count-plugins').innerText = siteData.plugins.length;
        document.getElementById('count-resources').innerText = siteData.resources.length;
    </script>
</body>
</html>
