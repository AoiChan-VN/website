<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hình Nền 4D Parallax</title>
  <style>
    /* Cấu hình biến CSS mặc định */
    :root {
      --move-x: 0px;
      --move-y: 0px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #020208;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px; /* Tạo chiều sâu không gian */
    }

    /* Khung chứa các lớp hình nền */
    .wallpaper-container {
      position: absolute;
      width: 110vw; /* Rộng hơn màn hình để khi nghiêng không lộ viền */
      height: 110vh;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* Các lớp không gian (Thay màu bằng ảnh thẻ <img> hoặc mã màu của bạn) */
    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Lớp 1: Nền xa nhất (Dịch chuyển rất ít) */
    .layer-bg {
      background-image: radial-gradient(circle, #251b45 0%, #0a0616 100%);
      transform: translateZ(-100px) scale(1.2);
    }

    /* Lớp 2: Các hành tinh / Hạt sáng ở giữa (Dịch chuyển vừa phải) */
    .layer-mid {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="100" height="100" viewBox="0 0 100 100"><circle cx="20" cy="30" r="2" fill="white" opacity="0.6"/><circle cx="70" cy="40" r="4" fill="%2300ffff" opacity="0.4"/><circle cx="40" cy="80" r="3" fill="%23ff00ff" opacity="0.5"/></svg>');
      /* Công thức Parallax dựa trên biến CSS */
      transform: translate3d(calc(var(--move-x) * 0.5), calc(var(--move-y) * 0.5), -50px) scale(1.1);
    }

    /* Lớp 3: Nhân vật chính / Vật thể gần nhất (Dịch chuyển mạnh nhất lao ra ngoài) */
    .layer-fg {
      transform: translate3d(calc(var(--move-x) * 1.5), calc(var(--move-y) * 1.5), 50px);
    }

    .crystal-core {
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      box-shadow: 0 0 50px #00f2fe;
      transform: rotate(45deg);
      border-radius: 10px;
      animation: float 4s ease-in-out infinite;
    }

    /* Nút kích hoạt cảm biến trên điện thoại */
    .btn-permission {
      position: fixed;
      z-index: 999;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    @keyframes float {
      0%, 100% { transform: rotate(45deg) translate(0, 0); }
      50% { transform: rotate(45deg) translate(-10px, -10px); }
    }
  </style>
</head>
<body>

  <button class="btn-permission" id="permissionBtn">Kích hoạt Chế độ 4D Parallax</button>

  <div class="wallpaper-container">
    <div class="layer layer-bg"></div>
    <div class="layer layer-mid"></div>
    <div class="layer layer-fg">
      <div class="crystal-core"></div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('permissionBtn');
    let ticking = false;

    // Hàm xử lý tọa độ khi người dùng nghiêng máy
    function handleOrientation(event) {
      // beta: trước/sau (-180 đến 180), gamma: trái/phải (-90 đến 90)
      let x = event.gamma; 
      let y = event.beta;  

      // Giới hạn góc nghiêng để tránh hiệu ứng bị giật quá đà
      if (x > 30) x = 30;
      if (x < -30) x = -30;
      if (y > 40) y = 40;
      if (y < -40) y = -40;

      // Khống chế hiệu năng bằng RequestAnimationFrame
      if (!ticking) {
        window.requestAnimationFrame(() => {
          // Quy đổi góc nghiêng thành đơn vị pixel di chuyển
          document.documentElement.style.setProperty('--move-x', `${x * 1.5}px`);
          document.documentElement.style.setProperty('--move-y', `${y * 1.5}px`);
          ticking = false;
        });
        ticking = true;
      }
    }

    // Hàm yêu cầu cấp quyền cảm biến (Bắt buộc cho iOS 13+ và các Android đời mới)
    function initSensor() {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // Dành cho thiết bị iOS
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
              btn.style.display = 'none';
            } else {
              alert('Bạn cần cấp quyền cảm biến để trải nghiệm không gian 4D.');
            }
          })
          .catch(console.error);
      } else {
        // Dành cho các thiết bị Android thông thường
        window.addEventListener('deviceorientation', handleOrientation);
        btn.style.display = 'none';
      }
    }

    btn.addEventListener('click', initSensor);
  </script>
</body>
</html>
