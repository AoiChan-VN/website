<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

  <title>Aoi Portfolio</title>

  <meta
    name="description"
    content="Aoi Portfolio Website"
  />

  <meta
    name="theme-color"
    content="#0f1117"
  />

  <link
    rel="icon"
    href="./favicon.ico"
  />

  <link
    rel="apple-touch-icon"
    href="./assets/icons/apple-touch-icon.png"
  />

  <link
    rel="stylesheet"
    href="./assets/css/reset.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/variables.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/base.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/layout.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/components.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/animations.css"
  />

  <link
    rel="stylesheet"
    href="./assets/css/responsive.css"
  />
</head>

<body>

  <div class="bg-layer"></div>

  <main class="app-shell">

    <header class="hero">

      <div class="hero-top">

        <img
          class="hero-logo"
          src="./assets/images/logo.webp"
          alt="Aoi Logo"
        />

      </div>

      <div class="hero-content">

        <h1 class="hero-title">
          Aoi Portfolio
        </h1>

        <p class="hero-description">
          Static Portfolio dành cho GitHub Pages.
        </p>

      </div>

    </header>

    <section class="cards-section">

      <div
        id="cards-container"
        class="cards-grid"
      ></div>

    </section>

  </main>

  <div
    id="overlay"
    class="overlay hidden"
  ></div>

  <aside
    id="panel"
    class="panel hidden"
  >

    <button
      id="close-panel"
      class="panel-close"
      type="button"
      aria-label="Đóng"
    >
      ×
    </button>

    <div id="panel-content"></div>

  </aside>

  <script
    src="./assets/js/utils.js"
    defer
  ></script>

  <script
    src="./assets/js/markdown.js"
    defer
  ></script>

  <script
    src="./assets/js/modal.js"
    defer
  ></script>

  <script
    src="./assets/js/loader.js"
    defer
  ></script>

  <script
    src="./assets/js/renderer.js"
    defer
  ></script>

  <script
    src="./assets/js/app.js"
    defer
  ></script>

</body>
</html>
