<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSG Dynamic Dashboard</title>
</head>

<div class="vsg-logo-container">
    <div class="fire-ring">
        <!-- Các lớp tạo hiệu ứng lửa chồng lên nhau -->
        <div class="fire-layer layer-1"></div>
        <div class="fire-layer layer-2"></div>
        <div class="fire-layer layer-3"></div>
        
        <!-- Chữ Aoi đứng yên ở giữa -->
        <div class="aoi-text">AOI</div>
    </div>
</div>

<style>
:root {
    --clr-1: #ff0000;
    --clr-2: #ff00ff;
    --clr-3: #00ffff;
    --clr-4: #ffea00;
}

.vsg-logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 300px;
    background: #000; /* Nền tối để nổi lửa */
}

.fire-ring {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.aoi-text {
    position: relative;
    font-size: 50px;
    font-weight: 900;
    color: white;
    letter-spacing: 5px;
    text-shadow: 0 0 10px rgba(255,255,255,0.8),
                 0 0 20px var(--clr-3);
    z-index: 10;
    font-family: 'Arial Black', sans-serif;
}

/* Hiệu ứng vòng tròn lửa RGB */
.fire-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    filter: blur(15px); /* Làm nhòe để tạo hiệu ứng khói/lửa */
    mix-blend-mode: screen;
}

.layer-1 {
    background: linear-gradient(var(--clr-1), var(--clr-2));
    animation: rotateFire 2s linear infinite, flicker 0.1s infinite;
}

.layer-2 {
    width: 95%;
    height: 95%;
    background: linear-gradient(var(--clr-3), var(--clr-4));
    animation: rotateFire 3s linear reverse infinite, flicker 0.15s infinite;
}

.layer-3 {
    width: 110%;
    height: 110%;
    border: 2px solid white;
    filter: blur(5px);
    opacity: 0.5;
    animation: rotateFire 5s linear infinite;
}

/* Animation xoay vòng tròn */
@keyframes rotateFire {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Animation rung nhẹ kiểu ngọn lửa đang cháy */
@keyframes flicker {
    0%, 100% { transform: scale(1) opacity(0.8); }
    50% { transform: scale(1.05) opacity(1); border-radius: 45% 55% 50% 50%; }
}

/* Thêm vệt sáng chạy quanh viền */
.fire-ring::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--clr-1), var(--clr-2), var(--clr-3), var(--clr-4), var(--clr-1));
    animation: rotateFire 1.5s linear infinite;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 100%);
    mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 100%);
    filter: blur(2px);
}
</style>
</body>
</html>
