<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1
        "
    >

    <meta
        name="theme-color"
        content="#0f1115"
    >

    <title>
        Vanilla Platform
    </title>

    <base href="./">

    <script>

        (() => {

            const savedTheme =
                localStorage.getItem(
                    'app-theme'
                );

            if (!savedTheme) {
                return;
            }

            try {

                const theme =
                    JSON.parse(savedTheme);

                document.documentElement
                    .dataset.theme = theme;

            } catch {}

        })();

    </script>

    <link
        rel="stylesheet"
        href="./assets/css/main.css"
    >

</head>

<body>

    <div id="app"></div>

    <script
        type="module"
        src="./assets/js/main.js"
    ></script>

</body>

</html>
