<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSG Dynamic Dashboard</title>
</head>

 <!-- HTML cho Logo -->
<div class="logo-3d-container">
    <div class="logo-3d">
        <!-- Tạo nhiều lớp để tạo độ dày (chiều sâu) cho chữ -->
        <span class="text-layer layer-1">Aoi</span>
        <span class="text-layer layer-2">Aoi</span>
        <span class="text-layer layer-3">Aoi</span>
        <span class="text-layer layer-4">Aoi</span>
        <span class="text-layer layer-5">Aoi</span>
        <span class="text-layer main-text">Aoi</span>
    </div>
</div>

<style>
.logo-3d-container {
    perspective: 1000px; /* Tạo không gian 3D */
    display: flex;
    justify-content: center;
    padding: 50px;
}

.logo-3d {
    position: relative;
    font-size: 80px;
    font-weight: 900;
    color: #00f2fe;
    text-transform: uppercase;
    transform-style: preserve-3d;
    animation: rotate3D 5s linear infinite; /* Animation xoay */
}

/* Định nghĩa các lớp tạo độ dày cho chữ (3D Depth) */
.text-layer {
    position: absolute;
    top: 0; left: 0;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}

.layer-1 { transform: translateZ(-2px); color: #008891; }
.layer-2 { transform: translateZ(-4px); color: #00727a; }
.layer-3 { transform: translateZ(-6px); color: #005c63; }
.layer-4 { transform: translateZ(-8px); color: #00464b; }
.layer-5 { transform: translateZ(-10px); color: #003033; }

.main-text {
    position: relative;
    color: #fff;
    text-shadow: 0 0 20px #00f2fe;
}

/* Animation xoay quanh trục Y */
@keyframes rotate3D {
    0% { transform: rotateY(0deg) rotateX(10deg); }
    100% { transform: rotateY(360deg) rotateX(10deg); }
}

/* Hiệu ứng Glow cho logo khi di chuột vào */
.logo-3d:hover {
    animation-play-state: paused; /* Dừng lại khi hover để nhìn rõ */
    cursor: pointer;
}
</style>
</body>
</html>
