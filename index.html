<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Kawaii.2K</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>

    <main class="dashboard-wrapper">
        <!-- TIÊU ĐỀ TRANG -->
        <div class="page-header">
            <h2 class="section-title">Hệ Thống Quản Trị</h2>
            <p>| Giám sát tài nguyên và trạng thái máy chủ.</p>
        </div>

        <!-- CỤM DASHBOARD CHÍNH -->
        <section class="dashboard-grid">
            
            <!-- BẢNG ADMIN: Thống kê Web -->
            <div class="card panel-box">
                <div class="panel-head"><span>ADMIN MONITOR</span></div>
                <div class="chart-box-stock">
                    <div id="stock-chart" class="stock-flow"></div>
                </div>
                <div class="mini-data-list" id="admin-logs"></div>
            </div>

            <!-- BẢNG SERVER: Thông số thực (API) -->
            <div class="card panel-box server-border">
                <div class="panel-head green"><span>SERVER CONSOLE</span></div>
                <div class="server-stats">
                    <div class="stat-row"><span>IP:</span> <code id="srv-ip">Loading...</code></div>
                    <div class="stat-row"><span>Status:</span> <strong id="srv-status">---</strong></div>
                    <div class="stat-row"><span>Players:</span> <strong id="srv-players">0/0</strong></div>
                    <div class="stat-row"><span>Version:</span> <strong id="srv-version">-</strong></div>
                </div>
                <div class="server-actions">
                    <button class="btn-action">START</button>
                    <button class="btn-action stop">STOP</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        document.getElementById('layout-root').innerHTML = Header();

        // API THẬT - Lấy trạng thái từ mcsrvstat
        async function updateServerInfo() {
            const ip = siteData.settings.serverIP || "play.hypixel.net";
            document.getElementById('srv-ip').innerText = ip;
            try {
                const res = await fetch(`https://mcsrvstat.us{ip}`);
                const data = await res.json();
                const status = document.getElementById('srv-status');
                if(data.online) {
                    status.innerText = "ONLINE"; status.style.color = "#22c55e";
                    document.getElementById('srv-players').innerText = `${data.players.online}/${data.players.max}`;
                    document.getElementById('srv-version').innerText = data.version;
                } else {
                    status.innerText = "OFFLINE"; status.style.color = "#ff4444";
                }
            } catch(e) { console.log("API Error"); }
        }

        // Render Biểu đồ Stock (Sợi mảnh)
        function renderAdminStats() {
            const chart = document.getElementById('stock-chart');
            const data = [siteData.plugins.length, siteData.resources.length, siteData.youtube.length];
            chart.innerHTML = data.map(val => `
                <div class="stock-col">
                    <div class="stock-stick" style="height:${val * 20}px"><div class="dot"></div></div>
                </div>
            `).join('');
            
            // Đổ Logs phân loại
            document.getElementById('admin-logs').innerHTML = [...siteData.plugins, ...siteData.resources].slice(0, 4).map(i => `
                <div class="log-min"><b>${i.name}</b> <small>Active</small></div>
            `).join('');
        }

        updateServerInfo();
        renderAdminStats();
    </script>
</body>
</html>
