<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Panel | 🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷◡</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="dashboard-body">
    <div id="layout-root"></div>

    <div class="panel-wrapper">
        <!-- SIDEBAR BÊN TRÁI -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="./assets/Logo.webp" class="logo-img">
                <span>PETERODGANEL</span>
            </div>
            <nav class="side-nav">
                <a href="#" class="active"><span>📊</span> Server</a>
                <a href="#"><span>📁</span> File Manager</a>
                <a href="#"><span>💾</span> Backups</a>
                <a href="#"><span>🌍</span> Network</a>
                <a href="#"><span>⚙️</span> Startup</a>
            </button>
            <div class="sidebar-footer">
                <button onclick="window.openSettings()" class="btn-sidebar-settings">⚙️ Settings</button>
            </div>
        </aside>

        <!-- CONTENT BÊN PHẢI -->
        <main class="panel-content">
            <header class="top-bar">
                <h2 class="section-title">Oashncovns</h2>
                <div class="top-actions">
                    <span class="status-badge online">ONLINE</span>
                    <button class="btn-action start">START</button>
                    <button class="btn-action stop">STOP</button>
                </div>
            </header>

            <div class="dashboard-grid-v3">
                <!-- 1. Plugin Manager (Biểu đồ Line Chart ) -->
                <div class="card widget-chart">
                    <h3>Plugin Manager Performance</h3>
                    <div id="chart-root" class="chart-container">
                        <!-- SVG Chart trượt từ file riêng -->
                    </div>
                </div>

                <!-- 2. Disk Usage / Resource Info -->
                <div class="card widget-resources">
                    <h3>Disk Usage (Real-time)</h3>
                    <div class="resource-list" id="resource-stats">
                        <!-- JS đổ dữ liệu: CPU, RAM, Disk -->
                    </div>
                </div>

                <!-- 3. Backup Status (Vòng tròn màu) -->
                <div class="card widget-backup">
                    <h3>Backup 9.124MB</h3>
                    <div class="circular-progress">
                        <svg viewBox="0 0 36 36" class="circular-chart pink">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" stroke-dasharray="75, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="percentage">75%</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        // Chỉ dùng Header cho Modal Settings, Navbar chính dùng Sidebar
        document.getElementById('layout-root').innerHTML = Header();
        
        // Load biểu đồ SVG
        async function initDashboard() {
            const res = await fetch('./assets/vectors/chart.svg');
            document.getElementById('chart-root').innerHTML = await res.text();
        }
        initDashboard();
    </script>
</body>
</html>
