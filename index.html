<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSG Dynamic Dashboard</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.8);
            --accent: #00f2fe;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Canvas nền cho các hạt Particle */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
        }

        /* Container chính của Card */
        .dashboard-card {
            width: 350px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .status {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            background: rgba(0, 242, 254, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--accent);
        }

        .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* SVG Graph Styling */
        .graph-container {
            height: 120px;
            margin: 20px 0;
        }

        svg {
            width: 100%; height: 100%;
        }

        .data-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .stat-box small {
            display: block;
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .stat-box span {
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="dashboard-card" id="card">
        <div class="header">
            <h2>VSG DYNAMIC</h2>
            <div class="status"><div class="dot"></div> LIVE</div>
        </div>

        <div class="data-value" id="main-value">0.00</div>

        <div class="graph-container">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
                        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <path id="path-fill" d="" fill="url(#fillGrad)"></path>
                <path id="path-line" d="" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"></path>
            </svg>
        </div>

        <div class="footer">
            <div class="stat-box">
                <small>Processing</small>
                <span id="proc-val">98.2%</span>
            </div>
            <div class="stat-box">
                <small>Latency</small>
                <span id="lat-val">14ms</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Hiệu ứng Particles nền ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 254, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        // --- 2. Animation Sóng SVG & Dữ liệu ---
        const linePath = document.getElementById('path-line');
        const fillPath = document.getElementById('path-fill');
        const valDisplay = document.getElementById('main-value');
        let points = [];
        let tick = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });

            tick += 0.05;
            let svgPoints = [];
            
            for (let i = 0; i <= 20; i++) {
                let x = i * 10;
                // Thuật toán sóng sin + nhiễu ngẫu nhiên
                let y = 50 + Math.sin(tick + (i * 0.5)) * 20 + Math.cos(tick * 0.8) * 5;
                svgPoints.push(`${x},${y}`);
            }

            const d = `M ${svgPoints.join(' L ')}`;
            linePath.setAttribute('d', d);
            fillPath.setAttribute('d', `${d} L 200,100 L 0,100 Z`);

            // Cập nhật số liệu giả
            if (Math.random() > 0.9) {
                let newVal = (Math.random() * 100).toFixed(2);
                valDisplay.innerText = newVal;
                document.getElementById('lat-val').innerText = Math.floor(Math.random() * 20 + 5) + 'ms';
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // --- 3. Hiệu ứng tương tác chuột (Tilt) ---
        const card = document.getElementById('card');
        card.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

    </script>
</body>
</html>
