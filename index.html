<!-- FILE: /native-space-portal/index.html -->

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <meta
        name="description"
        content="Native Space Fantasy Web Portal"
    />

    <meta
        name="theme-color"
        content="#050816"
    />

    <title>Native Space Portal</title>

    <!-- CORE STYLES -->
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/global.css" />

    <!-- MANIFEST -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- FAVICON -->
    <link rel="icon" href="./favicon.ico" />
</head>

<body>

    <!-- ROOT -->
    <div id="portal-root">

        <!-- COSMIC BACKGROUND -->
        <div id="portal-background">

            <!-- NEBULA FIELD -->
            <div
                class="depth-layer nebula-layer"
                data-depth="0.02"
                data-axis="both"
            ></div>

            <!-- STARFIELD -->
            <div
                class="depth-layer starfield-layer"
                data-depth="0.04"
                data-axis="both"
            ></div>

            <!-- GLOW ORBS -->
            <div
                class="floating-orb orb-alpha"
                data-depth="0.06"
                data-axis="x"
            ></div>

            <div
                class="floating-orb orb-beta"
                data-depth="0.08"
                data-axis="y"
            ></div>

            <div
                class="floating-orb orb-gamma"
                data-depth="0.1"
                data-axis="both"
            ></div>

        </div>

        <!-- PARALLAX STAGE -->
        <main id="portal-parallax-stage">

            <!-- UI LAYER -->
            <section id="portal-ui-layer">

                <!-- TOPBAR -->
                <header
                    id="portal-topbar"
                    class="glass-layer neon-border"
                >

                    <div class="topbar-left">
                        <div class="system-core-dot"></div>

                        <h1 class="portal-title">
                            Native Space Portal
                        </h1>
                    </div>

                    <div class="topbar-right">

                        <button
                            class="cosmic-button"
                            type="button"
                            aria-label="System Menu"
                        >
                            SYSTEM
                        </button>

                    </div>

                </header>

                <!-- MAIN PANEL -->
                <section
                    id="portal-main-panel"
                    class="cosmic-panel glass-layer neon-border"
                >

                    <!-- SIDEBAR -->
                    <aside
                        id="portal-sidebar"
                        class="glass-layer"
                    >

                        <nav class="sidebar-navigation">

                            <button
                                class="sidebar-button active"
                                type="button"
                                data-panel="home"
                            >
                                HOME
                            </button>

                            <button
                                class="sidebar-button"
                                type="button"
                                data-panel="documents"
                            >
                                DOCUMENTS
                            </button>

                            <button
                                class="sidebar-button"
                                type="button"
                                data-panel="library"
                            >
                                LIBRARY
                            </button>

                            <button
                                class="sidebar-button"
                                type="button"
                                data-panel="settings"
                            >
                                SETTINGS
                            </button>

                        </nav>

                    </aside>

                    <!-- CONTENT -->
                    <section
                        id="portal-document-viewer"
                        class="viewer-frame blur-surface"
                    >

                        <div class="viewer-background-grid"></div>

                        <div class="viewer-content">

                            <div class="viewer-badge">
                                SYSTEM READY
                            </div>

                            <h2 class="viewer-title">
                                Cosmic Native Runtime
                            </h2>

                            <p class="viewer-description">
                                Deep Space Environment Initialized.
                            </p>

                        </div>

                    </section>

                </section>

            </section>

        </main>

        <!-- MODAL ROOT -->
        <div id="portal-modal-root"></div>

        <!-- NOTIFICATION ROOT -->
        <div id="portal-notification-root"></div>

    </div>

    <!-- CORE RUNTIME -->
    <script
        type="module"
        src="./scripts/core.js"
    ></script>

</body>
</html>
