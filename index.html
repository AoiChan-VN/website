<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AoiChan Portfolio - Plugins & Resources">
    <meta name="author" content="AoiChan">
    <title>AoiChan | Premium Portfolio</title>
    <!-- CSS được gọi chính xác từ thư mục assets -->
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/res/rs.css">
</head>
<body data-theme="dark">

    <header class="glass-header">
        <div class="container flex-between">
            <div class="logo-area">
                <img src="./assets/img/logo/logo.png" alt="AoiChan" class="logo">
                <span>AOICHAN</span>
            </div>
            <div class="header-controls">
                <button onclick="Core.openPanel('menu')" class="menu-trigger">Menu System</button>
            </div>
        </div>
    </header>

    <main class="hero-wrapper">
        <div class="hero-glow"></div>
        <div class="container">
            <div class="hero-content">
                <h1 class="fade-in">AoiChan Project</h1>
                <p class="fade-in-delay">Nền tảng cung cấp Plugins và Resource Packs Minecraft chuẩn quốc tế.</p>
                <div class="hero-actions fade-in-delay-2">
                    <button onclick="Core.openPanel('plugins')" class="btn-main">Plugins List</button>
                    <button onclick="Core.openPanel('resource')" class="btn-sub">Resources</button>
                </div>
            </div>
        </div>
    </main>

    <!-- SPA SYSTEM: PANEL OVERLAY -->
    <div id="app-panel" class="panel-overlay">
        <div class="panel-nav">
            <div class="container flex-between">
                <h2 id="panel-title">SYSTEM</h2>
                <div class="close-circle" onclick="Core.closePanel()">×</div>
            </div>
        </div>
        <div class="panel-body">
            <div class="container">
                <div id="panel-content" class="grid-layout">
                    <!-- Data Injected Here -->
                </div>
            </div>
        </div>
    </div>

    <footer id="footer-root"></footer>

    <!-- Khởi tạo Logic -->
    <script type="module" src="./assets/js/core.js"></script>
</body>
</html>
