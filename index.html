<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>AoiChan</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/cards.css" />
  <link rel="stylesheet" href="./assets/css/panel.css" />
  <link rel="stylesheet" href="./assets/css/parallax.css" />
  <link rel="stylesheet" href="./assets/css/animations.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
  <link rel="stylesheet" href="./assets/css/app.css" />
</head>

<body>
  <div class="parallax-scene">
    <div class="parallax-layer layer-back"></div>
    <div class="parallax-layer layer-mid"></div>
    <div class="parallax-layer layer-front"></div>
    <div class="parallax-overlay"></div>
  </div>

  <div class="app-shell">

    <header class="topbar">
      <div class="brand-box">
        <h1 class="brand-title">AoiChan</h1>
        <p class="brand-subtitle">
          IOS • Anime • Fantasy • 3D
        </p>
      </div>
    </header>

    <main class="main-container">

      <section class="hero-section">
        <div class="glass-orb"></div>

        <div class="hero-content">
          <h2 class="hero-title">
            Welcome to the Fantasy Archive
          </h2>

          <p class="hero-description">
            Static Vanilla Website for GitHub Pages.
          </p>
        </div>
      </section>

      <section class="cards-section">
        <div id="cards-grid" class="cards-grid"></div>
      </section>

    </main>

  </div>

  <aside id="floating-panel" class="floating-panel hidden">
    <div class="panel-header">
      <h3 id="panel-title">Panel</h3>

      <button
        id="panel-close"
        class="panel-close"
        type="button"
        aria-label="Close Panel"
      >
        ×
      </button>
    </div>

    <div class="panel-content">
      <img
        id="panel-image"
        class="panel-image"
        src=""
        alt="Preview"
      />

      <p id="panel-description" class="panel-description"></p>

      <div class="panel-actions">
        <a
          id="panel-read"
          class="panel-button"
          href="#"
        >
          Open
        </a>

        <a
          id="panel-link"
          class="panel-button secondary"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Link
        </a>
      </div>
    </div>
  </aside>

  <div id="markdown-viewer" class="markdown-viewer hidden">
    <div class="markdown-shell">
      <button
        id="markdown-close"
        class="markdown-close"
        type="button"
      >
        ×
      </button>

      <article id="markdown-content"></article>
    </div>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
