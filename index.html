<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Aoi Portfolio</title>

  <!-- SEO -->
  <meta name="description" content="Aoi Portfolio Website" />
  <meta name="theme-color" content="#0b0d12" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="./assets/icons/favicon.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />

  <!-- JS -->
  <script type="module" src="./assets/js/main.js" defer></script>
</head>

<body>
  <div class="app-shell">

    <!-- Background -->
    <div class="background-layer">
      <img
        src="./assets/images/background.webp"
        alt="Background"
        class="background-image"
      />
      <div class="background-overlay"></div>
    </div>

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">

        <a href="./index.html" class="brand">
          <img
            src="./assets/logo/logo.png"
            alt="Logo"
            class="brand-logo"
          />

          <div class="brand-text">
            <h1 class="brand-title">Aoi Portfolio</h1>
            <p class="brand-subtitle">Static GitHub Pages</p>
          </div>
        </a>

      </div>
    </header>

    <!-- Main -->
    <main class="site-main">

      <section class="hero-section">
        <div class="hero-content glass-card">
          <h2 class="hero-title">
            Welcome Back
          </h2>

          <p class="hero-description">
            Data-driven portfolio system powered by pure static files.
          </p>
        </div>
      </section>

      <section class="portfolio-section">

        <div class="section-heading">
          <h2 class="section-title">Portfolio</h2>
        </div>

        <div
          id="portfolio-grid"
          class="portfolio-grid"
        ></div>

      </section>

    </main>

  </div>
</body>
</html>
