<!DOCTYPE html>

<html
  lang="en"
>

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      viewport-fit=cover
    "
  />

  <title>
    Aoi Interface
  </title>

  <meta
    name="description"
    content="
      IOS Anime cinematic
      static website.
    "
  />

  <meta
    name="theme-color"
    content="#070b14"
  />

  <meta
    name="color-scheme"
    content="dark"
  />

  <meta
    name="format-detection"
    content="telephone=no"
  />

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge"
  />

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  />

  <link
    rel="icon"
    type="image/png"
    href="
      ./assets/images/logo/icon-192.png
    "
  />

  <link
    rel="preload"
    href="./assets/css/main.css"
    as="style"
  />

  <link
    rel="stylesheet"
    href="./assets/css/main.css"
  />

</head>

<body>

  <div class="noise-layer"></div>

  <div class="app-shell">

    <aside
      class="sidebar"
    >

      <div class="sidebar-top">

        <a
          href="#/"
          class="logo-wrap"
          aria-label="Homepage"
        >

          <img
            class="logo-image"
            src="
              ./assets/images/logo/logo.webp
            "
            alt="Aoi Logo"
          />

        </a>

      </div>

      <nav
        class="sidebar-nav"
        aria-label="Primary Navigation"
      >

        <a
          href="#/"
          class="nav-item active"
          aria-label="Home"
        >
          ⌂
        </a>

        <a
          href="#/posts"
          class="nav-item"
          aria-label="Posts"
        >
          ✦
        </a>

      </nav>

      <div
        class="sidebar-bottom"
      ></div>

    </aside>

    <main
      class="main-layout"
    >

      <header
        class="topbar"
      >

        <div class="topbar-left">

          <div
            class="status-dot"
          ></div>

          <div
            class="status-text"
          >
            AOI SYSTEM
          </div>

        </div>

        <div class="topbar-right">

          <button
            class="top-button"
            type="button"
          >
            LIVE
          </button>

        </div>

      </header>

      <div
        id="app"
        class="app-view"
      ></div>

    </main>

  </div>

  <div
    id="overlay-panel"
    class="
      overlay-panel
      hidden
    "
  >

    <div
      class="overlay-box"
    >

      <button
        id="overlay-close"
        class="overlay-close"
        type="button"
        aria-label="Close"
      >
        ✕
      </button>

      <div
        id="overlay-content"
      ></div>

    </div>

  </div>

  <script
    type="module"
    src="
      ./assets/js/bootstrap.js
    "
  ></script>

</body>

</html>
