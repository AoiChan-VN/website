<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Website</title>

    <meta
        name="description"
        content="Minimal Anime iOS Portfolio Website"
    >

    <link
        rel="icon"
        type="image/svg+xml"
        href="./assets/icons/favicon.svg"
    >

    <link
        rel="preload"
        href="./styles/core/reset.css"
        as="style"
    >

    <link
        rel="preload"
        href="./styles/core/variables.css"
        as="style"
    >

    <link
        rel="preload"
        href="./styles/core/base.css"
        as="style"
    >

    <link
        rel="preload"
        href="./assets/fonts/SF-Pro-Display.woff2"
        as="font"
        type="font/woff2"
        crossorigin
    >

    <link rel="stylesheet" href="./styles/core/reset.css">
    <link rel="stylesheet" href="./styles/core/variables.css">
    <link rel="stylesheet" href="./styles/core/base.css">
    <link rel="stylesheet" href="./styles/core/typography.css">
    <link rel="stylesheet" href="./styles/core/animations.css">

    <link rel="stylesheet" href="./styles/layout/layout.css">
    <link rel="stylesheet" href="./styles/layout/header.css">
    <link rel="stylesheet" href="./styles/layout/footer.css">
    <link rel="stylesheet" href="./styles/layout/sections.css">

    <link rel="stylesheet" href="./styles/components/buttons.css">
    <link rel="stylesheet" href="./styles/components/cards.css">
    <link rel="stylesheet" href="./styles/components/panels.css">
    <link rel="stylesheet" href="./styles/components/modal.css">
    <link rel="stylesheet" href="./styles/components/navbar.css">
    <link rel="stylesheet" href="./styles/components/cursor.css">
    <link rel="stylesheet" href="./styles/components/audio.css">

    <link rel="stylesheet" href="./styles/pages/home.css">

    <script type="module" src="./scripts/core/bootstrap.js"></script>
</head>

<body>
    <div class="app-shell">
        <header
            class="site-header"
            data-component="navbar"
        ></header>

        <main class="site-main">
            <section class="hero-section">
                <div class="hero-background"></div>

                <div class="hero-content container">
                    <img
                        class="hero-logo"
                        src="./assets/images/branding/logo.webp"
                        alt="Website Logo"
                        loading="eager"
                        decoding="async"
                    >

                    <h1 class="hero-title">
                        Welcome To My Website
                    </h1>

                    <p class="hero-description">
                        Minimal Anime iOS Portfolio Experience
                    </p>
                </div>
            </section>

            <section class="products-section container">
                <div class="section-heading">
                    <h2>Sản phẩm nổi bật</h2>
                </div>

                <div
                    class="products-grid"
                    id="products-grid"
                ></div>
            </section>
        </main>

        <footer
            class="site-footer"
            data-component="footer"
        ></footer>
    </div>

    <div
        class="custom-cursor"
        aria-hidden="true"
    ></div>

    <div
        class="panel-layer"
        id="panel-layer"
    ></div>
</body>
</html>
