<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="layout-root"></div>

    <main style="padding: 40px 8%;">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div>
                <h2 class="section-title">Admin Dashboard</h2>
                <p style="margin: 5px 0 0 26px; opacity: 0.6;">| Phân tích tài nguyên nội bộ thời gian thực.</p>
            </div>
        </div>

        <section class="admin-panel-v4">
            <div class="card ptero-card main-admin-box">
                <div class="ptero-card-header">
                    <span class="ptero-title">SYSTEM RESOURCE MONITOR</span>
                    <div class="live-indicator">● ONLINE DATA</div>
                </div>
                
                <!-- Gọi biểu đồ từ file SVG ngoài -->
                <div class="ptero-card-body" id="chart-wrapper" style="height: 220px;">
                    <!-- SVG load ở đây -->
                </div>

                <!-- Thống kê số liệu thật từ database.js -->
                <div class="admin-stats-footer">
                    <div class="footer-item"><span>Plugins</span><strong id="p-count">0</strong></div>
                    <div class="footer-item"><span>Resources</span><strong id="r-count">0</strong></div>
                    <div class="footer-item"><span>Total Media</span><strong id="m-count">0</strong></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        // 1. Render linh kiện chung
        document.getElementById('layout-root').innerHTML = Header();

        // 2. Hàm xử lý biểu đồ dựa trên số liệu thật
        async function syncAdminDashboard() {
            const wrapper = document.getElementById('chart-wrapper');
            const response = await fetch('./assets/vectors/admin-chart.svg');
            wrapper.innerHTML = await response.text();

            const p = siteData.plugins.length;
            const r = siteData.resources.length;
            const m = siteData.youtube.length;

            // Cập nhật text số liệu
            document.getElementById('p-count').innerText = p;
            document.getElementById('r-count').innerText = r;
            document.getElementById('m-count').innerText = m;

            // Bẻ đường vẽ SVG theo dữ liệu thật (Logic Scale 15)
            const line = document.getElementById('svg-line');
            const area = document.getElementById('svg-area');
            if (line && area) {
                const yP = 150 - (p * 15 + 20);
                const yR = 150 - (r * 15 + 40);
                const yM = 150 - (m * 15 + 10);
                
                // Tạo chuỗi tọa độ gãy khúc (Step-line)
                const d = `M0,150 L0,${yP} L133,${yP} L133,${yR} L266,${yR} L266,${yM} L400,${yM}`;
                line.setAttribute('d', d);
                area.setAttribute('d', d + ` L400,150 L0,150 Z`);
            }
        }

        window.addEventListener('DOMContentLoaded', syncAdminDashboard);
    </script>
</body>
</html>
