<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AoiChan</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/root.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/animations.css" />
  <link rel="stylesheet" href="./assets/css/parallax.css" />
  <link rel="stylesheet" href="./assets/css/cards.css" />
  <link rel="stylesheet" href="./assets/css/panel.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
  <link rel="stylesheet" href="./assets/css/themes/aoi-theme.css" />
</head>

<body>

  <div class="app-shell">

    <div class="parallax-layer layer-back"></div>
    <div class="parallax-layer layer-middle"></div>
    <div class="parallax-layer layer-front"></div>

    <main class="main-container">

      <section class="hero-section">
        <div class="hero-glow"></div>

        <div class="hero-content">
          <h1 class="hero-title">
            AOI CHAN
          </h1>

          <p class="hero-subtitle">
            IOS • Anime • Huyền Huyễn • 3D Interface
          </p>
        </div>
      </section>

      <section
        id="cards-container"
        class="cards-grid"
      ></section>

    </main>

  </div>

  <div
    id="floating-panel"
    class="floating-panel hidden"
  >
    <div class="panel-content">

      <button
        id="panel-close"
        class="panel-close"
        type="button"
      >
        ×
      </button>

      <div id="panel-body"></div>

    </div>
  </div>

  <script
    type="module"
    src="./assets/js/core/app.js"
  ></script>

</body>
</html>
