<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠◞𝓗𝓸𝓶𝓮︵</title>
    <link rel="icon" type="image/webp" href="./assets/Logo.webp">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Vùng chứa Header & Settings -->
    <div id="layout-root"></div>

    <main style="padding: 40px 5%;">
        <!-- Header Trang Chủ -->
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div style="flex: 1;">
                <h2 class="section-title">🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷 𝓟𝓸𝓻𝓽𝓯𝓸𝓵𝓲𝓸</h2>
                <p style="margin: 5px 0 0 26px; opacity: 0.6;">◞𝓒𝓸𝓹𝔂𝓻𝓲𝓰𝓱𝓽◡𝓐𝓸𝓲𝓒𝓱𝓪𝓷︵</p>
            </div>
            <button onclick="window.toggleDashboard()" class="btn-primary" style="width: auto; padding: 12px 30px; border-radius: 50px;">
                📊 Dashboard Panel
            </button>
        </div>

        <!-- Dashboard Area: Cấu trúc Admin Panel -->
        <section id="dashboard-area" style="display: none;">
            <div class="main-panel">
                
                <!-- 1. Biểu đồ chính (Chiếm 3 cột) -->
                <div class="widget widget-main-chart">
                    <h3 class="panel-title">📈 Biểu đồ</h3>
                    <div id="chart-root" class="chart-wrapper"
                        <!-- dữ liệu svg sẽ đổ vào đây -->
                    </div>
                </div>

                <!-- 2. Nhật ký Log (Chiếm 1 cột bên phải) -->
                <div class="widget widget-logs">
                    <h3 style="margin: 0 0 20px 0; font-size: 1.1rem; color: var(--primary);">📄 Dữ liệu</h3>
                    <div id="log-list" class="log-container">
                        <!-- JS đổ dữ liệu vào đây -->
                    </div>
                </div>

                <!-- 3. Hàng Thẻ Thống Kê (Dàn hàng ngang 4 ô) -->
                <div class="mini-stats-grid">
                    <div class="stat-item">
                        <span>Plugins</span>
                        <strong id="p-val">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Resources</span>
                        <strong id="r-val">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Media</span>
                        <strong id="m-val">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Server Status</span>
                        <strong style="color: #22c55e; font-size: 1.2rem;">Online</strong>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script type="module">
        import { Header } from './js/components/Layout.js';
        import { siteData } from './js/data/database.js';
        import './js/main.js';

        // Khởi tạo Header
        document.getElementById('layout-root').innerHTML = Header();

        // Hàm load SVG từ file riêng
        async function loadChart() {
            const chartRoot = document.getElementById('chart-root');
            if (chartRoot && chartRoot.innerHTML.trim() === "") {
                const response = await fetch('./assets/vectors/chart.svg');
                const svgText = await response.text();
                chartRoot.innerHTML = svgText;
            }
        }

        // Logic điều khiển Dashboard
        window.toggleDashboard = () => {
            const area = document.getElementById('dashboard-area');
            const isHidden = area.style.display === 'none';
            
            area.style.display = isHidden ? 'block' : 'none';

            if (isHidden) {
                // Load Chart khi mở Dashboard
                loadChart();
                
                // Cập nhật số liệu
                document.getElementById('p-val').innerText = siteData.plugins.length;
                document.getElementById('r-val').innerText = siteData.resources.length;
                document.getElementById('m-val').innerText = siteData.youtube.length;

                // Đổ dữ liệu Log
                const logList = document.getElementById('log-list');
                const allData = [...siteData.plugins, ...siteData.resources];
                
                logList.innerHTML = allData.map(item => `
                    <div class="log-entry">
                        <div>
                            <b style="color:white; display:block;">${item.name}</b>
                            <small style="opacity:0.5;">Update: ${item.version || item.size}</small>
                        </div>
                        <div class="status-indicator"></div>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
